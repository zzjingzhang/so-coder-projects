<p-card class="w-full">
  <ng-template pTemplate="header">
    <div class="bg-green-600 text-white p-4 rounded-t-lg">
      <h2 class="text-xl font-bold">分子动画可视化</h2>
      <p class="text-sm opacity-90">观察 NO₂ 和 N₂O₄ 分子的运动与反应</p>
    </div>
  </ng-template>

  <div class="flex justify-center">
    <div class="relative border-4 border-gray-700 rounded-lg overflow-hidden shadow-lg">
      <canvas #canvas class="block"></canvas>
    </div>
  </div>

  <div class="mt-4 grid grid-cols-2 gap-4">
    <div class="flex items-center gap-2 p-3 bg-red-50 rounded-lg">
      <div class="w-6 h-6 rounded-full bg-red-900"></div>
      <div>
        <span class="font-semibold text-red-900">NO₂</span>
        <span class="text-sm text-gray-600 ml-2">棕红色气体</span>
      </div>
    </div>
    <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg">
      <div class="w-8 h-5 rounded-full bg-gray-300 border border-gray-400"></div>
      <div>
        <span class="font-semibold text-gray-700">N₂O₄</span>
        <span class="text-sm text-gray-600 ml-2">无色气体</span>
      </div>
    </div>
  </div>

  <div class="mt-4 p-4 bg-blue-50 rounded-lg">
    <h4 class="font-semibold text-blue-800 mb-2">
      <i class="pi pi-info-circle mr-2"></i>勒沙特列原理演示
    </h4>
    <ul class="text-sm text-blue-700 space-y-1">
      <li>• <strong>升高温度</strong>：平衡向吸热方向（逆向）移动，NO₂ 增加，颜色变深</li>
      <li>• <strong>降低温度</strong>：平衡向放热方向（正向）移动，N₂O₄ 增加，颜色变浅</li>
      <li>• <strong>增加 NO₂ 浓度</strong>：平衡正向移动，生成更多 N₂O₄</li>
      <li>• <strong>增加 N₂O₄ 浓度</strong>：平衡逆向移动，生成更多 NO₂</li>
    </ul>
  </div>
</p-card>
