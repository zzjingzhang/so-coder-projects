<div 
  #scrollContainer
  class="scroll-container h-screen overflow-y-auto bg-gray-100"
>
  <app-collapsible-header></app-collapsible-header>

  <div class="p-4">
    <div 
      *ngFor="let item of items; let i = index"
      class="scroll-snap-item rounded-xl mb-4 overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-300"
      [ngClass]="getBackgroundColor(i)"
    >
      <div class="p-6 flex items-start gap-4">
        <div 
          class="flex-shrink-0 w-16 h-16 rounded-xl flex items-center justify-center"
          [ngClass]="getBackgroundColor(i) === 'bg-white' ? 'bg-gradient-to-br from-blue-50 to-purple-50' : 'bg-gradient-to-br from-indigo-50 to-pink-50'"
        >
          <span class="text-2xl font-bold" [ngClass]="getIndexColor(i)">
            {{ item.icon.charAt(0).toUpperCase() }}
          </span>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-2">
            <span 
              class="text-sm font-semibold px-2 py-0.5 rounded"
              [ngClass]="getCategoryColor(item.category)"
            >
              {{ item.category }}
            </span>
            <span class="text-gray-400 text-sm">#{{ item.id }}</span>
          </div>

          <h3 class="text-lg font-semibold text-gray-800 mb-1">
            {{ item.title }}
          </h3>

          <p class="text-gray-600 text-sm leading-relaxed line-clamp-2">
            {{ item.description }}
          </p>
        </div>

        <div class="flex-shrink-0 flex items-center">
          <button 
            type="button" 
            class="p-2 rounded-full hover:bg-gray-200 hover:text-gray-600 transition-colors"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div 
    *ngIf="isSnapping"
    class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-black/70 text-white px-6 py-3 rounded-full text-sm shadow-lg flex items-center gap-2 z-50"
  >
    <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Snapping to position...
  </div>
</div>
