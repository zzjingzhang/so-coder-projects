<section class="section-padding bg-gradient-to-r from-secondary-600 to-secondary-700">
  <div class="container-custom mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto text-center">
      <div class="inline-flex items-center space-x-2 bg-white/10 backdrop-blur-sm px-4 py-2 rounded-full mb-6">
        <span nz-icon nzType="mail" nzTheme="outline" class="text-white"></span>
        <span class="text-white text-sm font-medium">Newsletter</span>
      </div>

      <h2 class="text-3xl sm:text-4xl font-bold text-white mb-4">
        Stay Updated With
        <span class="text-yellow-300">Our Latest Courses</span>
      </h2>

      <p class="text-secondary-100 mb-8 max-w-2xl mx-auto">
        Subscribe to our newsletter and never miss an update about new courses, special offers, and learning tips from our experts.
      </p>

      <form (ngSubmit)="onSubmit()" class="max-w-xl mx-auto">
        <div class="flex flex-col sm:flex-row gap-4">
          <div class="flex-1 relative">
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Enter your email address"
              required
              class="w-full px-6 py-4 rounded-xl bg-white/10 backdrop-blur-sm border-2 border-white/20 text-white placeholder-secondary-200 focus:outline-none focus:border-white/50 transition-colors"
            />
            <span 
              nz-icon 
              nzType="mail" 
              nzTheme="outline" 
              class="absolute right-5 top-1/2 transform -translate-y-1/2 text-secondary-200"
            ></span>
          </div>

          <button
            type="submit"
            [disabled]="isSubmitting || !email"
            class="no-hover px-8 py-4 bg-white text-secondary-700 font-semibold rounded-xl shadow-lg transition-all duration-300 hover:shadow-xl hover:-translate-y-1 active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed disabled:hover:translate-y-0 flex items-center justify-center space-x-2"
          >
            @if (isSubmitting) {
              <span nz-icon nzType="loading" class="animate-spin"></span>
              <span>Subscribing...</span>
            } @else {
              <span>Subscribe</span>
              <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
            }
          </button>
        </div>

        <p class="text-secondary-200 text-sm mt-4">
          <span nz-icon nzType="check-circle" nzTheme="outline" class="mr-1"></span>
          We respect your privacy. Unsubscribe at any time.
        </p>
      </form>

      <div class="grid grid-cols-3 gap-8 mt-12 pt-12 border-t border-white/20">
        <div class="text-center">
          <div class="text-3xl font-bold text-white mb-1">500+</div>
          <div class="text-secondary-200 text-sm">Courses Available</div>
        </div>
        <div class="text-center">
          <div class="text-3xl font-bold text-white mb-1">15K+</div>
          <div class="text-secondary-200 text-sm">Happy Students</div>
        </div>
        <div class="text-center">
          <div class="text-3xl font-bold text-white mb-1">100%</div>
          <div class="text-secondary-200 text-sm">Satisfaction</div>
        </div>
      </div>
    </div>
  </div>
</section>
