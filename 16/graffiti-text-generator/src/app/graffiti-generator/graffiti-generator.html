<div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-white mb-2" style="text-shadow: 0 0 10px rgba(255, 107, 107, 0.8), 0 0 20px rgba(255, 107, 107, 0.6), 0 0 30px rgba(255, 107, 107, 0.4);">
        涂鸦文本生成器
      </h1>
      <p class="text-gray-400 text-lg">创建属于你的街头艺术作品</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Control Panel -->
      <div class="lg:col-span-1">
        <nz-card class="shadow-2xl bg-gray-800 border-none rounded-xl" nzTitle="控制面板">
          <!-- Text Input -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">输入文本</label>
            <input 
              nz-input 
              [(ngModel)]="text" 
              placeholder="输入涂鸦文字" 
              class="bg-gray-700 border-gray-600 text-white placeholder-gray-400 rounded-lg h-12"
            />
          </div>

          <!-- Style Selection -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">涂鸦风格</label>
            <nz-select [(ngModel)]="selectedStyle" class="w-full h-12">
              <nz-option *ngFor="let style of graffitiStyles" [nzLabel]="style.name" [nzValue]="style.value"></nz-option>
            </nz-select>
          </div>

          <!-- Background Selection -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">背景风格</label>
            <nz-select [(ngModel)]="selectedBackground" class="w-full h-12">
              <nz-option *ngFor="let bg of backgroundStyles" [nzLabel]="bg.name" [nzValue]="bg.value"></nz-option>
            </nz-select>
          </div>

          <!-- Color Selection -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">文字颜色</label>
            <div class="grid grid-cols-6 gap-2">
              <button 
                *ngFor="let color of colorOptions" 
                class="w-10 h-10 rounded-full border-2 transition-all duration-300 hover:scale-110"
                [ngClass]="{'border-white ring-2 ring-offset-2 ring-offset-gray-800 ring-white': textColor === color.value}"
                [style.backgroundColor]="color.value"
                (click)="textColor = color.value"
              ></button>
            </div>
          </div>

          <!-- Font Size -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">字体大小: {{ fontSize }}px</label>
            <nz-slider [(ngModel)]="fontSize" [nzMin]="50" [nzMax]="200"></nz-slider>
          </div>

          <!-- Letter Spacing -->
          <div class="mb-6">
            <label class="block text-gray-300 mb-2 font-medium">字母间距: {{ letterSpacing }}px</label>
            <nz-slider [(ngModel)]="letterSpacing" [nzMin]="0" [nzMax]="50"></nz-slider>
          </div>

          <!-- Toggle Options -->
          <div class="mb-6 space-y-3">
            <label class="block text-gray-300 mb-2 font-medium">效果选项</label>
            <nz-switch [(ngModel)]="showOutline" class="mr-2"></nz-switch>
            <span class="text-gray-300">显示轮廓</span>
            
            <br>
            
            <nz-switch [(ngModel)]="showFill" class="mr-2"></nz-switch>
            <span class="text-gray-300">颜色填充</span>
            
            <br>
            
            <nz-switch [(ngModel)]="showDrips" class="mr-2"></nz-switch>
            <span class="text-gray-300">喷漆滴落</span>
          </div>

          <!-- Action Buttons -->
          <div class="space-y-3">
            <button 
              nz-button 
              nzType="primary" 
              class="w-full h-12 text-lg font-medium rounded-lg bg-gradient-to-r from-pink-500 to-red-500 hover:from-pink-600 hover:to-red-600 border-none"
              [nzLoading]="isGenerating"
              (click)="generateGraffiti()"
            >
              <span *ngIf="!isGenerating">生成涂鸦</span>
              <span *ngIf="isGenerating">生成中...</span>
            </button>
            
            <button 
              nz-button 
              class="w-full h-12 text-lg font-medium rounded-lg bg-gray-700 hover:bg-gray-600 text-white border-none"
              (click)="randomize()"
            >
              随机样式
            </button>
            
            <button 
              nz-button 
              nzDanger
              class="w-full h-12 text-lg font-medium rounded-lg"
              (click)="reset()"
            >
              重置
            </button>
          </div>
        </nz-card>
      </div>

      <!-- Preview Area -->
      <div class="lg:col-span-2">
        <nz-card class="shadow-2xl bg-gray-800 border-none rounded-xl" nzTitle="预览效果">
          <div 
            class="relative overflow-hidden rounded-xl flex items-center justify-center min-h-custom"
            [class]="backgroundClasses"
            [style.backgroundColor]="selectedBackground === 'solid' ? backgroundColor : 'transparent'"
          >
            <!-- Graffiti Text -->
            <div 
              class="relative z-10 text-center"
              [class]="graffitiClasses"
              [style.fontSize.px]="fontSize"
              [style.letterSpacing.px]="letterSpacing"
              [style.color]="textColor"
            >
              {{ text }}
              
              <!-- Drips Effect -->
              <div *ngIf="showDrips" class="absolute bottom-[-60px] left-0 right-0 flex justify-around">
                <div 
                  *ngFor="let i of [1, 2, 3, 4, 5]" 
                  class="drip"
                  [style.height.px]="20 + i * 10"
                  [style.left.%]="10 + i * 15"
                ></div>
              </div>
            </div>

            <!-- Spray Effects -->
            <div class="spray-overlay absolute inset-0 pointer-events-none opacity-30"></div>

            <!-- Grid Overlay for Style -->
            <div class="absolute inset-0 pointer-events-none opacity-10" style="background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px;"></div>
          </div>

          <!-- Style Info -->
          <div class="mt-6 p-4 bg-gray-700 rounded-lg">
            <h4 class="text-white font-medium mb-2">当前设置</h4>
            <div class="grid grid-cols-2 gap-4 text-sm">
              <div class="text-gray-400">
                <span class="font-medium text-gray-300">风格: </span>
                <span>{{ getStyleName(selectedStyle) }}</span>
              </div>
              <div class="text-gray-400">
                <span class="font-medium text-gray-300">背景: </span>
                <span>{{ getBackgroundName(selectedBackground) }}</span>
              </div>
              <div class="text-gray-400">
                <span class="font-medium text-gray-300">字体大小: </span>
                <span>{{ fontSize }}px</span>
              </div>
              <div class="text-gray-400">
                <span class="font-medium text-gray-300">字母间距: </span>
                <span>{{ letterSpacing }}px</span>
              </div>
            </div>
          </div>
        </nz-card>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-500">
      <p>© 2026 涂鸦文本生成器 | 用艺术点亮城市</p>
    </div>
  </div>
</div>
