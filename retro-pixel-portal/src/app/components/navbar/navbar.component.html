<nav class="bg-retro-light-gray pixel-border relative z-40">
  <!-- 顶部横幅 -->
  <div class="bg-retro-blue text-retro-white text-center py-1 text-xs font-dos">
    <span class="blink">★</span> WELCOME TO THE RETRO PIXEL PORTAL ★ EST. 2001 ★
    <span class="blink">★</span> VISITOR COUNT: {{ visitorCount }} ★
  </div>
  
  <!-- 主导航 -->
  <div class="flex items-center justify-between px-4 py-2">
    <!-- Logo -->
    <a routerLink="/home" class="flex items-center gap-2">
      <div class="w-10 h-10 bg-retro-light-cyan border-4 border-retro-cyan flex items-center justify-center shadow-retro">
        <span class="text-retro-black font-bold text-xl">RP</span>
      </div>
      <div class="hidden md:block">
        <h1 class="font-pixel text-retro-blue text-sm leading-tight">RETRO</h1>
        <h1 class="font-pixel text-retro-red text-sm leading-tight">PIXEL</h1>
      </div>
    </a>

    <!-- 桌面端导航 -->
    <div class="hidden md:flex items-center gap-1">
      @for (item of navItems; track item.path) {
        <a 
          routerLink="{{ item.path }}" 
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="pixel-button bg-retro-light-gray px-3 py-2 text-retro-black font-dos text-sm border-2 border-retro-gray shadow-retro hover:bg-retro-gray transition-colors"
        >
          {{ item.label }}
        </a>
      }
    </div>

    <!-- 移动端菜单按钮 -->
    <button 
      (click)="toggleMenu()"
      class="md:hidden pixel-button bg-retro-light-gray px-3 py-2 border-2 border-retro-gray shadow-retro"
    >
      <span class="text-retro-black">☰</span>
    </button>
  </div>

  <!-- 移动端菜单 -->
  @if (isMenuOpen) {
    <div class="md:hidden bg-retro-light-gray border-t-4 border-retro-gray">
      @for (item of navItems; track item.path) {
        <a 
          routerLink="{{ item.path }}" 
          (click)="toggleMenu()"
          class="block px-4 py-3 text-retro-black font-dos text-sm border-b-2 border-retro-gray hover:bg-retro-gray transition-colors"
        >
          <span class="mr-2">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </div>
  }
</nav>
