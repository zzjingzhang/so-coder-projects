<div class="dashboard-container h-full flex flex-col bg-[#EEEEEE]">
  <div class="top-toolbar flex items-center justify-between px-6 py-4 bg-[#1a1a2e] text-white shadow-lg">
    <div class="toolbar-left flex items-center gap-4">
      <button class="sidebar-toggle-btn w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors mr-4" (click)="toggleLeftSidebar.emit()">
        <fa-icon [icon]="'bars'" class="text-gray-400"></fa-icon>
      </button>
      <div class="sprint-nav flex items-center gap-3">
        <button
          class="nav-btn w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors"
          (click)="onPreviousSprint()"
        >
          <fa-icon [icon]="'chevron-left'" class="text-gray-400"></fa-icon>
        </button>
        <div class="sprint-info">
          <h1 class="sprint-title text-xl font-bold text-[#49D9A0]">{{ currentSprint }}</h1>
          <p class="sprint-subtitle text-xs text-gray-400">Agile Sprint Dashboard</p>
        </div>
        <button
          class="nav-btn w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors"
          (click)="onNextSprint()"
        >
          <fa-icon [icon]="'chevron-right'" class="text-gray-400"></fa-icon>
        </button>
      </div>
    </div>
    <div class="toolbar-right flex items-center gap-3">
      <button class="sidebar-toggle-btn w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors mr-2" (click)="toggleRightSidebar.emit()">
        <fa-icon [icon]="'columns'" class="text-gray-400"></fa-icon>
      </button>
      <button
        class="complete-sprint-btn flex items-center gap-2 px-5 py-2.5 bg-[#49D9A0] text-gray-900 font-semibold rounded-lg hover:bg-[#3bc48e] transition-colors shadow-lg"
        (click)="onCompleteSprint()"
      >
        <fa-icon [icon]="'check-double'"></fa-icon>
        Complete Sprint
      </button>
    </div>
  </div>

  <div class="main-content flex-1 overflow-y-auto p-6">
    <div class="content-wrapper max-w-7xl mx-auto space-y-6">
      <div class="metrics-section">
        <app-metric-cards></app-metric-cards>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="chart-section">
          <app-burn-chart></app-burn-chart>
        </div>
        <div class="team-section">
          <app-team-members></app-team-members>
        </div>
      </div>

      <div class="table-section">
        <app-story-table></app-story-table>
      </div>
    </div>
  </div>
</div>
