<div class="left-sidebar h-full flex flex-col bg-[#1a1a2e] text-white" [class.collapsed]="isCollapsed">
  <div class="sidebar-header flex items-center justify-between p-4 border-b border-gray-700">
    <div class="logo flex items-center gap-3" *ngIf="!isCollapsed">
      <div class="logo-icon w-10 h-10 rounded-lg bg-[#49D9A0] flex items-center justify-center">
        <fa-icon [icon]="'tachometer-alt'" class="text-gray-900 text-lg"></fa-icon>
      </div>
      <span class="logo-text text-xl font-bold">SprintHub</span>
    </div>
    <button class="toggle-btn w-8 h-8 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors" (click)="toggleSidebar()">
      <fa-icon [icon]="isCollapsed ? 'chevron-right' : 'chevron-left'" class="text-gray-400"></fa-icon>
    </button>
  </div>

  <nav class="nav-items flex-1 overflow-y-auto p-3">
    <ul class="space-y-1">
      <li *ngFor="let item of navItems">
        <button
          class="nav-item w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all duration-200"
          [class.active]="activeRoute === item.route"
          (click)="navigateTo(item.route)"
          [matTooltip]="isCollapsed ? item.label : ''"
          matTooltipPosition="right"
        >
          <fa-icon [icon]="item.icon" class="text-lg" [class.text-[#49D9A0]]="activeRoute === item.route"></fa-icon>
          <span *ngIf="!isCollapsed" class="nav-label">{{ item.label }}</span>
        </button>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer border-t border-gray-700 p-4">
    <div class="bottom-actions flex items-center justify-between" *ngIf="!isCollapsed">
      <button class="notification-btn relative w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors">
        <fa-icon [icon]="'bell'" class="text-gray-400"></fa-icon>
        <span class="notification-badge absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center">3</span>
      </button>
      <div class="user-avatar w-10 h-10 rounded-full bg-[#49D9A0] flex items-center justify-center cursor-pointer hover:ring-2 hover:ring-[#49D9A0] transition-all">
        <span class="text-gray-900 font-bold text-sm">JD</span>
      </div>
    </div>
    <div class="bottom-actions-collapsed flex flex-col items-center gap-3" *ngIf="isCollapsed">
      <button class="notification-btn relative w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors">
        <fa-icon [icon]="'bell'" class="text-gray-400"></fa-icon>
        <span class="notification-badge absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center">3</span>
      </button>
      <div class="user-avatar w-10 h-10 rounded-full bg-[#49D9A0] flex items-center justify-center cursor-pointer hover:ring-2 hover:ring-[#49D9A0] transition-all">
        <span class="text-gray-900 font-bold text-sm">JD</span>
      </div>
    </div>
  </div>
</div>
