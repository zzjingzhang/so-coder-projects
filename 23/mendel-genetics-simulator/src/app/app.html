<div class="min-h-screen bg-gray-50">
  <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-6 px-4 shadow-lg">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-3xl font-bold mb-2">🧬 孟德尔遗传定律模拟实验</h1>
      <p class="text-blue-100">通过互动模拟，理解遗传学的基本原理</p>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="mb-8">
      <div class="flex items-center justify-between flex-wrap">
        @for (step of steps; track step; let i = $index) {
          @if (i > 0) {
            <div 
              class="flex-1 h-1 mx-2"
              [class.bg-blue-500]="currentStep > i"
              [class.bg-gray-300]="currentStep <= i"
            ></div>
          }
          <div 
              class="relative cursor-pointer" (click)="goToStep(i)">
            <div 
              class="w-12 h-12 rounded-full flex items-center justify-center border-2 transition-colors"
              [class.bg-blue-500]="currentStep >= i"
              [class.bg-white]="currentStep < i"
              [class.border-blue-500]="currentStep >= i"
              [class.border-gray-300]="currentStep < i"
              [class.text-white]="currentStep >= i"
              [class.text-gray-500]="currentStep < i"
            >
              <span class="font-bold">{{ i + 1 }}</span>
            </div>
            <div class="absolute top-16 left-1/2 transform -translate-x-1/2 w-32 text-center">
              <p 
                class="text-sm font-medium"
                [class.text-blue-600]="currentStep >= i"
                [class.text-gray-500]="currentStep < i"
              >{{ step.title }}</p>
              <p 
                class="text-xs"
                [class.text-blue-400]="currentStep >= i"
                [class.text-gray-400]="currentStep < i"
              >{{ step.description }}</p>
            </div>
          </div>
        }
      </div>
      <div class="h-16"></div>
    </div>

    <div class="fade-in">
      @if (currentStep === 0) {
        <app-knowledge (nextStep)="nextStep()"></app-knowledge>
      }

      @if (currentStep === 1) {
        <app-trait-upload
          (traitsSelected)="onTraitsSelected($event.dominant, $event.recessive)"
          (backStep)="prevStep()"
        ></app-trait-upload>
      }

      @if (currentStep === 2) {
        <app-hybrid-simulation
          [dominantTrait]="dominantTrait"
          [recessiveTrait]="recessiveTrait"
          (simulationComplete)="onSimulationComplete($event)"
          (backStep)="prevStep()"
        ></app-hybrid-simulation>
      }

      @if (currentStep === 3) {
        <app-results-display
          [pGeneration]="pGeneration"
          [f1Generation]="f1Generation"
          [f2Generation]="f2Generation"
          [dominantTrait]="dominantTrait"
          [recessiveTrait]="recessiveTrait"
          (backStep)="prevStep()"
          (resetSimulation)="resetSimulation()"
        ></app-results-display>
      }
    </div>
  </div>

  <footer class="bg-gray-100 py-4 mt-8 text-center text-gray-600">
    <p>孟德尔遗传定律模拟实验 | 帮助学生理解遗传学基本原理</p>
  </footer>
</div>
