<div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 md:p-8 shadow-2xl border border-white/20">
  <!-- Password Output Section -->
  <div class="mb-8">
    <label class="block text-gray-300 text-sm font-medium mb-3">生成的密码</label>
    <div class="relative">
      <div 
        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-4 pr-28 font-mono text-lg md:text-xl text-white break-all min-h-[60px] flex items-center transition-all duration-300"
        [class.ring-2]="copied"
        [class.ring-green-500]="copied"
      >
        <span [class.animate-pulse]="generating">{{ generating ? '生成中...' : password }}</span>
      </div>
      <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-2">
        <button 
          pButton 
          type="button"
          class="p-button-text p-button-plain"
          [style]="{ background: 'transparent', border: 'none', padding: '0.5rem', minWidth: 'auto', height: 'auto' }"
          (click)="copyToClipboard()"
          pTooltip="{{ copied ? '已复制!' : '复制到剪贴板' }}"
          tooltipPosition="top"
          [disabled]="generating || !password"
        >
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            class="h-5 w-5 transition-colors duration-200"
            [class.text-green-400]="copied"
            [class.text-gray-400]="!copied"
            [class.hover:text-white]="!copied"
            fill="none" 
            viewBox="0 0 24 24" 
            stroke="currentColor"
          >
            <ng-container *ngIf="copied; else copyIcon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </ng-container>
            <ng-template #copyIcon>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </ng-template>
          </svg>
        </button>
        <button 
          pButton 
          type="button"
          class="p-button-text p-button-plain"
          [style]="{ background: 'transparent', border: 'none', padding: '0.5rem', minWidth: 'auto', height: 'auto' }"
          (click)="generatePassword()"
          pTooltip="重新生成"
          tooltipPosition="top"
          [disabled]="generating"
        >
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            class="h-5 w-5 text-gray-400 hover:text-white transition-colors duration-200"
            [class.animate-spin]="generating"
            fill="none" 
            viewBox="0 0 24 24" 
            stroke="currentColor"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Strength Indicator -->
  <div class="mb-8">
    <div class="flex justify-between items-center mb-2">
      <label class="text-gray-300 text-sm font-medium">密码强度</label>
      <span 
        class="text-sm font-medium transition-colors duration-300"
        [class.text-red-400]="strength.score <= 25"
        [class.text-yellow-400]="strength.score === 50"
        [class.text-blue-400]="strength.score === 75"
        [class.text-green-400]="strength.score === 100"
      >
        {{ strength.label }}
      </span>
    </div>
    <div class="w-full bg-black/30 rounded-full h-3 overflow-hidden">
      <div 
        class="h-full rounded-full transition-all duration-500 ease-out"
        [ngClass]="strength.colorClass"
        [style.width.%]="strength.score"
      ></div>
    </div>
  </div>

  <!-- Password Length Section -->
  <div class="mb-8">
    <div class="flex justify-between items-center mb-4">
      <div class="flex items-center gap-2">
        <label class="text-gray-300 text-sm font-medium">密码长度</label>
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          class="h-4 w-4 text-gray-400 cursor-help"
          fill="none" 
          viewBox="0 0 24 24" 
          stroke="currentColor"
          pTooltip="密码越长，安全性越高。建议使用至少12位字符的密码。"
          tooltipPosition="top"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <p-inputNumber 
        [(ngModel)]="passwordLength" 
        [min]="minLength" 
        [max]="maxLength"
        [showButtons]="true"
        [inputStyle]="{ width: '80px', textAlign: 'center', background: 'rgba(0,0,0,0.3)', borderColor: 'rgba(255,255,255,0.1)', color: 'white' }"
        (onInput)="generatePassword()"
        (onChange)="generatePassword()"
      ></p-inputNumber>
    </div>
    <p-slider 
      [(ngModel)]="passwordLength" 
      [min]="minLength" 
      [max]="maxLength"
      [step]="1"
      (onChange)="generatePassword()"
      [style]="{ width: '100%' }"
    ></p-slider>
    <div class="flex justify-between mt-2 text-xs text-gray-300">
      <span>{{ minLength }}</span>
      <span>{{ maxLength }}</span>
    </div>
  </div>

  <!-- Character Set Options -->
  <div class="mb-8">
    <div class="flex items-center gap-2 mb-4">
      <label class="text-gray-300 text-sm font-medium">字符集选项</label>
      <svg 
        xmlns="http://www.w3.org/2000/svg" 
        class="h-4 w-4 text-gray-400 cursor-help"
        fill="none" 
        viewBox="0 0 24 24" 
        stroke="currentColor"
        pTooltip="根据您的使用场景选择合适的字符集类型。"
        tooltipPosition="top"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <div class="space-y-3">
      <div 
        *ngFor="let option of characterSetOptions"
        class="flex items-start p-4 rounded-xl border transition-all duration-200 cursor-pointer"
        [class.bg-white/5]="characterSetType === option.value"
        [class.border-white/20]="characterSetType === option.value"
        [class.bg-transparent]="characterSetType !== option.value"
        [class.border-white/10]="characterSetType !== option.value"
        [class.hover:bg-white/5]="characterSetType !== option.value"
        (click)="characterSetType = option.value; generatePassword()"
      >
        <p-radioButton 
          [(ngModel)]="characterSetType" 
          [value]="option.value"
          name="characterSet"
          [inputId]="option.value"
          class="mt-1"
        ></p-radioButton>
        <label [for]="option.value" class="ml-3 flex-1 cursor-pointer">
          <div class="flex items-center justify-between">
            <span class="text-white font-medium">{{ option.label }}</span>
            <svg 
              xmlns="http://www.w3.org/2000/svg" 
              class="h-4 w-4 text-gray-400 cursor-help"
              fill="none" 
              viewBox="0 0 24 24" 
              stroke="currentColor"
              (click)="$event.stopPropagation()"
              [pTooltip]="getCharacterSetInfo(option.value)"
              tooltipPosition="top"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <p class="text-gray-400 text-sm mt-1">{{ option.description }}</p>
        </label>
      </div>
    </div>
  </div>

  <!-- Generate Button -->
  <button 
    pButton 
    type="button"
    label="生成新密码"
    icon="pi pi-refresh"
    class="w-full text-lg py-4"
    [style]="{
      background: 'linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%)',
      border: 'none',
      borderRadius: '12px',
      fontWeight: '600'
    }"
    (click)="generatePassword()"
    [disabled]="generating"
  ></button>
</div>
