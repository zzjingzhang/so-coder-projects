<header class="sticky top-0 z-50 backdrop-blur-md bg-black/30 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center space-x-2">
        <span class="text-2xl">🎵</span>
        <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
          Lofi Chill
        </h1>
      </div>

      <nav class="hidden md:flex items-center space-x-4">
        <a 
          routerLink="/" 
          routerLinkActive="text-purple-400"
          class="text-white/80 hover:text-white transition-colors px-3 py-2 rounded-lg hover:bg-white/10"
        >
          首页
        </a>
        <a 
          routerLink="/focus" 
          routerLinkActive="text-purple-400"
          class="text-white/80 hover:text-white transition-colors px-3 py-2 rounded-lg hover:bg-white/10"
        >
          焦点模式
        </a>
      </nav>

      <div class="flex items-center space-x-3">
        <button
          nz-button
          nzShape="circle"
          [nzGhost]="true"
          nz-tooltip
          [nzTooltipTitle]="themeService.isDarkMode() ? '切换到亮色模式' : '切换到暗色模式'"
          (click)="themeService.toggleDarkMode()"
          class="text-white"
        >
          <span nz-icon [nzType]="themeService.isDarkMode() ? 'sun' : 'moon'" class="text-lg"></span>
        </button>

        <button
          nz-button
          nzShape="circle"
          [nzGhost]="true"
          nz-tooltip
          nzTooltipTitle="全屏模式"
          (click)="themeService.toggleFullscreen()"
          class="text-white"
        >
          <span nz-icon nzType="fullscreen" class="text-lg"></span>
        </button>
      </div>
    </div>
  </div>
</header>
