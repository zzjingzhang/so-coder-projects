<div class="glass-panel p-6">
  <h2 class="text-xl font-bold text-white mb-4">🎵 选择心情</h2>
  
  <!-- 心情选择器 -->
  <div class="grid grid-cols-3 gap-3 mb-6">
    <button
      nz-button
      [nzType]="themeService.getMood() === 'chill' ? 'primary' : 'default'"
      nzGhost
      (click)="setMood('chill')"
      class="flex flex-col items-center gap-2 p-4"
    >
      <span class="text-2xl">❄️</span>
      <span>Chill</span>
    </button>
    
    <button
      nz-button
      [nzType]="themeService.getMood() === 'jazz' ? 'primary' : 'default'"
      nzGhost
      (click)="setMood('jazz')"
      class="flex flex-col items-center gap-2 p-4"
    >
      <span class="text-2xl">🎷</span>
      <span>Jazz</span>
    </button>
    
    <button
      nz-button
      [nzType]="themeService.getMood() === 'sleep' ? 'primary' : 'default'"
      nzGhost
      (click)="setMood('sleep')"
      class="flex flex-col items-center gap-2 p-4"
    >
      <span class="text-2xl">🌙</span>
      <span>Sleep</span>
    </button>
  </div>

  <!-- 日间/夜间模式 -->
  <div class="mb-6">
    <h3 class="text-white/80 text-sm mb-3">时间模式</h3>
    <nz-radio-group 
      [ngModel]="themeService.getDayNight()" 
      (ngModelChange)="setDayNight($event)"
    >
      <label nz-radio-button nzValue="day">☀️ 日间</label>
      <label nz-radio-button nzValue="night">🌙 夜间</label>
    </nz-radio-group>
  </div>

  <!-- 雨天模式 -->
  <div class="flex items-center justify-between">
    <span class="text-white flex items-center gap-2">
      <span nz-icon nzType="cloud-rain" class="text-lg"></span>
      雨天模式
    </span>
    <nz-switch
      [ngModel]="themeService.isRainMode()"
      (ngModelChange)="themeService.toggleRainMode()"
    ></nz-switch>
  </div>
</div>
