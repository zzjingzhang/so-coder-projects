<div class="glass-panel p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold text-white">📝 待办事项</h2>
    <span class="text-white/60 text-sm">
      {{ getCompletedCount() }} / {{ todoService.getTodos().length }} 已完成
    </span>
  </div>

  <!-- 添加新待办 -->
  <div class="flex gap-2 mb-4">
    <input
      nz-input
      placeholder="添加新的待办事项..."
      [(ngModel)]="newTodoText"
      (keydown.enter)="addTodo()"
      class="bg-white/10 border-white/20 text-white placeholder-white/40"
    >
    <button
      nz-button
      nzType="primary"
      (click)="addTodo()"
      [disabled]="!newTodoText.trim()"
    >
      添加
    </button>
  </div>

  <!-- 待办列表 -->
  <div class="space-y-2 max-h-80 overflow-y-auto">
    <nz-empty *ngIf="todoService.getTodos().length === 0" nzNotFoundDescription="暂无待办事项"></nz-empty>

    <div
      *ngFor="let todo of todoService.getTodos()"
      class="flex items-center justify-between p-3 bg-white/5 rounded-lg hover:bg-white/10 transition-colors group"
    >
      <div class="flex items-center gap-3">
        <label class="flex items-center cursor-pointer">
          <nz-checkbox
            [ngModel]="todo.completed"
            (ngModelChange)="toggleTodo(todo)"
          ></nz-checkbox>
        </label>
        <span
          class="text-white"
          [class.line-through]="todo.completed"
          [class.opacity-40]="todo.completed"
        >
          {{ todo.text }}
        </span>
      </div>
      <button
        nz-button
        nzShape="circle"
        nzSize="small"
        nzDanger
        nzGhost
        (click)="deleteTodo(todo)"
        class="opacity-0 group-hover:opacity-100 transition-opacity"
      >
        <span nz-icon nzType="delete"></span>
      </button>
    </div>
  </div>

  <!-- 清除已完成 -->
  <button
    *ngIf="getCompletedCount() > 0"
    nz-button
    nzType="dashed"
    nzDanger
    nzBlock
    (click)="todoService.clearCompleted()"
    class="mt-4"
  >
    清除已完成
  </button>
</div>
