<div class="min-h-screen bg-gradient-to-b from-racing-dark via-racing-blue to-racing-dark flex flex-col items-center p-4">
  <!-- 顶部状态栏 -->
  <div class="w-full max-w-md mb-4">
    <div class="flex justify-between items-center bg-white/10 backdrop-blur-sm rounded-lg p-4">
      <button
        nz-button
        nzType="text"
        (click)="goHome()"
        class="text-gray-300 hover:text-white flex items-center gap-1"
      >
        <span nz-icon nzType="home" nzTheme="outline"></span>
        首页
      </button>
      
      <div class="flex items-center gap-6">
        <div class="text-center">
          <p class="text-gray-400 text-xs">分数</p>
          <p class="text-xl font-bold text-white">{{ gameState?.score }}</p>
        </div>
        
        <div class="text-center">
          <p class="text-gray-400 text-xs">等级</p>
          <p class="text-xl font-bold text-racing-yellow">{{ gameState?.level }}</p>
        </div>
        
        <div class="text-center">
          <p class="text-gray-400 text-xs">生命</p>
          <div class="flex gap-1">
            @for (heart of [1, 2, 3]; track heart) {
              <span 
                nz-icon 
                nzType="heart" 
                [nzTheme]="heart <= (gameState?.lives || 0) ? 'fill' : 'outline'"
                class="text-lg"
                [class.text-red-400]="heart <= (gameState?.lives || 0)"
                [class.text-gray-600]="heart > (gameState?.lives || 0)"
              ></span>
            }
          </div>
        </div>
      </div>
      
      <button
        nz-button
        nzType="text"
        (click)="togglePause()"
        class="text-gray-300 hover:text-white"
      >
        <span nz-icon [nzType]="gameState?.isPaused ? 'play-circle' : 'pause-circle'" nzTheme="outline" class="text-2xl"></span>
      </button>
    </div>
  </div>

  <!-- 游戏区域 -->
  <div class="relative">
    <!-- 游戏画布 -->
    <div 
      class="relative bg-gray-700 rounded-lg overflow-hidden shadow-2xl border-4 border-gray-600"
      [style.width.px]="canvasWidth"
      [style.height.px]="canvasHeight"
    >
      <!-- 道路背景 -->
      <div class="absolute inset-0 bg-gray-800"></div>
      
      <!-- 车道分隔线 -->
      <div 
        class="absolute top-0 bottom-0 bg-gray-600"
        [style.left.px]="getLaneWidth() - 2"
        [style.width.px]="4"
      ></div>
      <div 
        class="absolute top-0 bottom-0 bg-gray-600"
        [style.left.px]="getLaneWidth() * 2 - 2"
        [style.width.px]="4"
      ></div>
      
      <!-- 道路边缘 -->
      <div class="absolute left-0 top-0 bottom-0 w-2 bg-racing-green"></div>
      <div class="absolute right-0 top-0 bottom-0 w-2 bg-racing-green"></div>
      
      <!-- 道路虚线 -->
      @for (line of roadLines; track line.y) {
        <div 
          class="absolute left-0 right-0 flex justify-around"
          [style.top.px]="line.y"
        >
          <div 
            class="bg-yellow-400"
            [style.width.px]="getLaneWidth() / 3"
            [style.height.px]="30"
            [style.marginLeft.px]="getLaneWidth() / 3"
          ></div>
          <div 
            class="bg-yellow-400"
            [style.width.px]="getLaneWidth() / 3"
            [style.height.px]="30"
            [style.marginLeft.px]="getLaneWidth()"
          ></div>
        </div>
      }
      
      <!-- 障碍物车辆 -->
      @for (obs of obstacles; track obs) {
        <div 
          class="absolute rounded-lg shadow-lg"
          [style.left.px]="obs.x"
          [style.top.px]="obs.y"
          [style.width.px]="obs.width"
          [style.height.px]="obs.height"
          [style.backgroundColor]="obs.color"
        >
          <!-- 车辆形状 -->
          <div class="absolute inset-1 rounded flex flex-col items-center justify-center">
            <!-- 车顶 -->
            <div class="w-3/4 h-2/5 bg-black/20 rounded-t"></div>
            <!-- 车身 -->
            <div class="w-full h-2/5 bg-black/10"></div>
            <!-- 车底 -->
            <div class="w-full h-1/5 flex justify-between px-1">
              <div class="w-1/4 h-full bg-gray-900 rounded"></div>
              <div class="w-1/4 h-full bg-gray-900 rounded"></div>
            </div>
          </div>
        </div>
      }
      
      <!-- 玩家车辆 -->
      @if (playerCar) {
        <div 
          class="absolute rounded-lg shadow-lg transition-all duration-150 ease-out"
          [style.left.px]="playerCar.x"
          [style.top.px]="playerCar.y"
          [style.width.px]="playerCar.width"
          [style.height.px]="playerCar.height"
          [style.backgroundColor]="playerCar.color"
        >
          <!-- 车辆形状 -->
          <div class="absolute inset-1 rounded flex flex-col items-center justify-center">
            <!-- 车顶 -->
            <div class="w-3/4 h-1/5 bg-black/20 rounded-t"></div>
            <!-- 挡风玻璃 -->
            <div class="w-3/4 h-1/5 bg-blue-900/50 rounded"></div>
            <!-- 车身 -->
            <div class="w-full h-1/5 bg-black/10"></div>
            <!-- 尾灯 -->
            <div class="w-full h-1/5 flex justify-between px-1 items-center">
              <div class="w-1/3 h-2/3 bg-red-600 rounded"></div>
              <div class="w-1/3 h-2/3 bg-red-600 rounded"></div>
            </div>
            <!-- 车底（车轮） -->
            <div class="w-full h-1/5 flex justify-between px-1">
              <div class="w-1/4 h-full bg-gray-900 rounded"></div>
              <div class="w-1/4 h-full bg-gray-900 rounded"></div>
            </div>
          </div>
        </div>
      }
      
      <!-- 暂停遮罩 -->
      @if (gameState?.isPaused) {
        <div class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center backdrop-blur-sm">
          <span nz-icon nzType="pause-circle" nzTheme="outline" class="text-6xl text-white mb-4"></span>
          <p class="text-2xl font-bold text-white mb-2">游戏暂停</p>
          <p class="text-gray-400">按空格键或点击继续按钮</p>
        </div>
      }
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="w-full max-w-md mt-4">
    <div class="flex justify-center gap-8">
      <button
        nz-button
        nzType="primary"
        nzSize="large"
        (mousedown)="moveLeft()"
        (touchstart)="moveLeft()"
        class="w-24 h-24 text-3xl bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 border-none shadow-lg shadow-blue-500/30 flex items-center justify-center rounded-xl"
      >
        <span nz-icon nzType="left" nzTheme="outline" class="text-4xl"></span>
      </button>
      
      <button
        nz-button
        nzType="primary"
        nzSize="large"
        (mousedown)="moveRight()"
        (touchstart)="moveRight()"
        class="w-24 h-24 text-3xl bg-gradient-to-br from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 border-none shadow-lg shadow-blue-500/30 flex items-center justify-center rounded-xl"
      >
        <span nz-icon nzType="right" nzTheme="outline" class="text-4xl"></span>
      </button>
    </div>
    
    <div class="text-center mt-4">
      <p class="text-gray-400 text-sm">
        键盘: <kbd class="bg-gray-700 px-2 py-1 rounded text-xs">←</kbd> 
        <kbd class="bg-gray-700 px-2 py-1 rounded text-xs">→</kbd> 移动 | 
        <kbd class="bg-gray-700 px-2 py-1 rounded text-xs">空格</kbd> 暂停
      </p>
    </div>
  </div>
</div>
