<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between h-16">
      <a routerLink="/" class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-lg">N</span>
        </div>
        <span class="text-xl font-bold text-secondary-800">NewsHub</span>
      </a>

      <nav class="hidden md:flex items-center space-x-8">
        <a 
          routerLink="/" 
          routerLinkActive="text-primary-600"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-secondary-700 hover:text-primary-600 font-medium transition-colors"
        >
          首页
        </a>
        
        <div class="relative group" *ngFor="let category of categories">
          <a 
            [routerLink]="['/category', category.id]"
            routerLinkActive="text-primary-600"
            class="text-secondary-700 hover:text-primary-600 font-medium transition-colors flex items-center space-x-1"
          >
            <span>{{ category.icon }}</span>
            <span>{{ category.name }}</span>
          </a>
        </div>
      </nav>

      <div class="flex items-center space-x-4">
        <form (submit)="onSearch()" class="hidden sm:flex items-center">
          <div class="relative">
            <input 
              type="text" 
              [(ngModel)]="searchQuery"
              name="searchQuery"
              placeholder="搜索新闻..."
              class="pl-10 pr-4 py-2 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
            />
            <svg 
              class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-secondary-400" 
              fill="none" 
              stroke="currentColor" 
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
        </form>

        <button 
          (click)="toggleMobileMenu()"
          class="md:hidden p-2 rounded-lg hover:bg-secondary-100 transition-colors"
        >
          <svg *ngIf="!mobileMenuOpen" class="w-6 h-6 text-secondary-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg *ngIf="mobileMenuOpen" class="w-6 h-6 text-secondary-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="mobileMenuOpen" class="md:hidden bg-white border-t border-secondary-200">
    <div class="px-4 py-3 sm:hidden">
      <form (submit)="onSearch()" class="flex">
        <input 
          type="text" 
          [(ngModel)]="searchQuery"
          name="searchQuery"
          placeholder="搜索新闻..."
          class="flex-1 px-4 py-2 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
        />
        <button type="submit" class="ml-2 px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
          搜索
        </button>
      </form>
    </div>

    <nav class="px-4 py-2 space-y-1">
      <a 
        routerLink="/" 
        (click)="closeMobileMenu()"
        routerLinkActive="bg-primary-50 text-primary-600"
        [routerLinkActiveOptions]="{ exact: true }"
        class="block px-3 py-2 rounded-lg text-secondary-700 hover:bg-secondary-100 font-medium transition-colors"
      >
        首页
      </a>
      
      <a 
        *ngFor="let category of categories"
        [routerLink]="['/category', category.id]"
        (click)="closeMobileMenu()"
        routerLinkActive="bg-primary-50 text-primary-600"
        class="block px-3 py-2 rounded-lg text-secondary-700 hover:bg-secondary-100 font-medium transition-colors flex items-center space-x-2"
      >
        <span>{{ category.icon }}</span>
        <span>{{ category.name }}</span>
      </a>
    </nav>
  </div>
</header>
