      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4">新闻分类</h3>
        <ul class="space-y-2">
          <li *ngFor="let category of categories">
            <a 
              [routerLink]="['/category', category.id]"
              class="text-secondary-300 hover:text-white transition-colors text-sm flex items-center space-x-2"
            >
              <span>{{ category.icon }}</span>
              <span>{{ category.name }}</span>
            </a>
          </li>
        </ul>
      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4">关于我们</h3>
        <ul class="space-y-2">
          <li>
            <a routerLink="/about" class="text-secondary-300 hover:text-white transition-colors text-sm">
              公司简介
            </a>
          </li>
          <li>
            <a routerLink="/contact" class="text-secondary-300 hover:text-white transition-colors text-sm">
              联系我们
            </a>
          </li>
          <li>
            <a href="#" class="text-secondary-300 hover:text-white transition-colors text-sm">
              加入我们
            </a>
          </li>
          <li>
            <a href="#" class="text-secondary-300 hover:text-white transition-colors text-sm">
              广告合作
            </a>
          </li>
        </ul>
      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4">订阅新闻</h3>
        <p class="text-secondary-300 text-sm mb-4">
          订阅我们的新闻通讯，获取最新资讯推送。
        </p>
        <form class="flex flex-col space-y-2">
          <input 
            type="email" 
            placeholder="输入您的邮箱"
            class="px-4 py-2 bg-secondary-700 border border-secondary-600 rounded-lg text-white placeholder-secondary-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-sm"
          />
          <button 
            type="button"
            class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors font-medium text-sm flex items-center justify-center"
          >
            订阅
          </button>
        </form>
      </div>
    </div>

    <div class="border-t border-secondary-700 mt-8 pt-8 flex flex-col md:flex-row justify-between items-center">
      <p class="text-secondary-400 text-sm">
        © {{ currentYear }} NewsHub. 保留所有权利。
      </p>
      <div class="flex space-x-6 mt-4 md:mt-0">
        <a href="#" class="text-secondary-400 hover:text-white transition-colors text-sm">
          隐私政策
        </a>
        <a href="#" class="text-secondary-400 hover:text-white transition-colors text-sm">
          使用条款
        </a>
        <a href="#" class="text-secondary-400 hover:text-white transition-colors text-sm">
          Cookie 政策
        </a>
      </div>
    </div>
  </div>
</footer>
