<div *ngIf="!isLoading" class="container mx-auto px-4 py-8">
  <section class="mb-12">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold text-secondary-800 flex items-center">
        <span class="w-1 h-8 bg-primary-600 rounded mr-3"></span>
        头条新闻
      </h2>
    </div>
    
    <div *ngIf="featuredArticles.length > 0" class="mb-8">
      <app-news-card 
        [article]="featuredArticles[0]" 
        variant="featured"
      ></app-news-card>
    </div>
  </section>

  <section class="mb-12">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold text-secondary-800 flex items-center">
        <span class="w-1 h-8 bg-primary-600 rounded mr-3"></span>
        新闻分类
      </h2>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
      <a 
        *ngFor="let category of categories"
        [routerLink]="['/category', category.id]"
        class="card p-4 text-center hover:shadow-lg transition-all duration-300 group"
      >
        <div class="text-4xl mb-2">{{ category.icon }}</div>
        <h3 class="font-semibold text-secondary-800 group-hover:text-primary-600 transition-colors">
          {{ category.name }}
        </h3>
        <p class="text-xs text-secondary-500 mt-1">
          {{ category.articleCount }} 篇文章
        </p>
      </a>
    </div>
  </section>

  <section class="mb-12">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold text-secondary-800 flex items-center">
        <span class="w-1 h-8 bg-primary-600 rounded mr-3"></span>
        最新资讯
      </h2>
      <a 
        routerLink="/category/technology" 
        class="text-primary-600 hover:text-primary-700 font-medium flex items-center transition-colors"
      >
        查看更多
        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </a>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <app-news-card 
        *ngFor="let article of latestArticles"
        [article]="article"
        variant="default"
      ></app-news-card>
    </div>
  </section>

  <section class="bg-primary-600 rounded-2xl p-8 md:p-12 text-white">
    <div class="max-w-3xl mx-auto text-center">
      <h2 class="text-3xl font-bold mb-4">订阅我们的新闻通讯</h2>
      <p class="text-primary-100 mb-6">
        每周精选优质内容，直接发送到您的邮箱。随时了解最新动态，不错过任何重要新闻。
      </p>
      <form class="flex flex-col sm:flex-row gap-3 max-w-lg mx-auto">
        <input 
          type="email" 
          placeholder="输入您的邮箱地址"
          class="flex-1 px-4 py-3 rounded-lg text-secondary-800 placeholder-secondary-400 focus:outline-none focus:ring-2 focus:ring-white"
        />
        <button 
          type="button"
          class="px-6 py-3 bg-white text-primary-600 rounded-lg font-semibold hover:bg-primary-50 transition-colors flex items-center justify-center"
        >
          立即订阅
        </button>
      </form>
      <p class="text-xs text-primary-200 mt-4">
        我们尊重您的隐私，绝不会向第三方分享您的信息。
      </p>
    </div>
  </section>
</div>
