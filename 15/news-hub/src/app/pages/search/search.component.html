<div class="container mx-auto px-4 py-8">
  <div class="max-w-2xl mx-auto mb-8">
    <h1 class="text-3xl font-bold text-secondary-800 mb-4 text-center">搜索新闻</h1>
    <form (submit)="onSearch()" class="flex gap-3">
      <div class="relative flex-1">
        <input 
          type="text" 
          [(ngModel)]="searchQuery"
          name="searchQuery"
          placeholder="输入关键词搜索新闻..."
          class="w-full pl-12 pr-4 py-3 border border-secondary-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent text-lg"
        />
        <svg 
          class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-secondary-400" 
          fill="none" 
          stroke="currentColor" 
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
      <button 
        type="submit"
        class="px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors font-medium flex items-center"
      >
        搜索
      </button>
    </form>
  </div>

  <div *ngIf="!isLoading">
    <div *ngIf="searchQuery && articles.length > 0; else noResults">
      <div class="mb-6">
        <p class="text-secondary-600">
          找到 <span class="font-semibold text-primary-600">{{ articles.length }}</span> 条与 "<span class="font-semibold">{{ searchQuery }}</span>" 相关的结果
        </p>
      </div>

      <div class="space-y-6">
        <app-news-card 
          *ngFor="let article of articles"
          [article]="article"
          variant="horizontal"
        ></app-news-card>
      </div>
    </div>

    <ng-template #noResults>
      <div *ngIf="searchQuery" class="text-center py-16">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="text-xl font-semibold text-secondary-800 mb-2">未找到相关内容</h3>
        <p class="text-secondary-500 mb-4">
          没有找到与 "<span class="font-medium">{{ searchQuery }}</span>" 相关的新闻
        </p>
        <p class="text-secondary-500 text-sm">
          请尝试使用其他关键词搜索
        </p>
        <a 
          routerLink="/" 
          class="btn btn-primary mt-6 inline-flex"
        >
          返回首页
        </a>
      </div>

      <div *ngIf="!searchQuery" class="text-center py-16">
        <div class="text-6xl mb-4">📰</div>
        <h3 class="text-xl font-semibold text-secondary-800 mb-2">开始搜索</h3>
        <p class="text-secondary-500">
          在上方搜索框输入关键词，开始搜索您感兴趣的新闻
        </p>
        <a 
          routerLink="/" 
          class="btn btn-primary mt-6 inline-flex"
        >
          浏览首页
        </a>
      </div>
    </ng-template>
  </div>

  <div *ngIf="isLoading" class="text-center py-16">
    <div class="inline-flex items-center justify-center">
      <svg class="animate-spin h-8 w-8 text-primary-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="ml-3 text-secondary-600">搜索中...</span>
    </div>
  </div>
</div>
