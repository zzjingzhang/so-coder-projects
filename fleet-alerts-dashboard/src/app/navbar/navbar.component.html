<nav class="bg-white border-b border-gray-200 px-6 py-3 shadow-sm">
  <div class="flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">F</span>
        </div>
        <span class="text-lg font-semibold text-gray-800">Fleet Manager</span>
      </div>
      
      <div class="hidden md:flex items-center space-x-6 ml-8">
        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Dashboard</a>
        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Vehicles</a>
        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Drivers</a>
        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Trips</a>
        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium text-sm">Reports</a>
      </div>
    </div>
    
    <div class="flex items-center space-x-4">
      <div class="hidden md:flex items-center bg-gray-100 rounded-lg px-3 py-2">
        <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" placeholder="Search..." class="bg-transparent border-none outline-none text-sm text-gray-600 w-48">
      </div>
      
      <div class="relative">
        <button 
          (click)="onNotificationsClick()"
          class="relative p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
          [ngClass]="{
            'bg-gray-100 text-gray-700': isDropdownOpen
          }"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span 
            *ngIf="unreadCount > 0"
            class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-medium rounded-full min-w-4 h-4 flex items-center justify-center px-1"
          >
            {{ unreadCount > 9 ? '9+' : unreadCount }}
          </span>
        </button>
        
        <div 
          *ngIf="isDropdownOpen"
          class="absolute right-0 top-full mt-2 w-96 bg-white rounded-lg shadow-lg border border-gray-200 z-50"
        >
          <div class="px-4 py-3 border-b border-gray-100">
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-semibold text-gray-900">通知</h3>
              <span class="text-xs text-gray-500">{{ unreadCount }} 条未读</span>
            </div>
          </div>
          
          <div class="max-h-96 overflow-y-auto">
            <div *ngIf="recentAlerts.length > 0">
              <div 
                *ngFor="let alert of recentAlerts"
                (click)="onAlertClick(alert)"
                class="px-4 py-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 transition-colors border-l-4"
                [ngClass]="getAlertTypeClass(alert.type)"
              >
                <div class="flex items-start">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center space-x-2">
                      <div 
                        class="w-2 h-2 rounded-full flex-shrink-0"
                        [ngClass]="getDotClass(alert.type)"
                      ></div>
                      <p class="text-sm font-medium text-gray-900 truncate">{{ alert.title }}</p>
                    </div>
                    <p class="text-xs text-gray-500 mt-1 truncate">{{ alert.context }}</p>
                    <p class="text-xs text-gray-600 mt-1 truncate">{{ alert.details }}</p>
                    <p class="text-xs text-gray-400 mt-1">{{ formatTime(alert.timestamp) }}</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div *ngIf="recentAlerts.length === 0" class="px-4 py-8 text-center">
              <svg class="w-10 h-10 text-gray-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
              <p class="text-sm text-gray-500">暂无新通知</p>
            </div>
          </div>
          
          <div class="px-4 py-3 border-t border-gray-100 bg-gray-50 rounded-b-lg">
            <button 
              (click)="viewAllAlerts()"
              class="w-full text-sm text-blue-600 hover:text-blue-700 font-medium text-center transition-colors"
            >
              查看全部通知
            </button>
          </div>
        </div>
      </div>
      
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-500 rounded-full flex items-center justify-center">
          <span class="text-white font-medium text-sm">JD</span>
        </div>
        <span class="hidden md:inline text-sm font-medium text-gray-700">John Doe</span>
      </div>
    </div>
  </div>
</nav>
