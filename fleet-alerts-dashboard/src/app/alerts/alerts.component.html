<div class="min-h-screen" [style.background-color]="'#F7F9FB'">
  <app-navbar 
    [unreadCount]="unreadCount"
    (notificationsClick)="onNotificationsClick()"
  ></app-navbar>
  
  <div class="max-w-5xl mx-auto px-6 py-8">
    <div class="flex justify-between items-start mb-6">
      <div>
        <h1 class="text-2xl font-semibold text-gray-900 mb-1">警报</h1>
        <p class="text-sm text-gray-500">
          随时了解关键问题、所需采取的行动和系统更新。
        </p>
      </div>
      
      <button 
        (click)="markAllAsRead()"
        class="text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors"
      >
        全部标记为已读
      </button>
    </div>
    
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6">
      <div class="flex border-b border-gray-200">
        <button 
          (click)="switchTab('all')"
          class="flex items-center space-x-2 px-6 py-4 text-sm font-medium transition-colors"
          [ngClass]="{
            'text-blue-600 border-b-2 border-blue-600': activeTab === 'all',
            'text-gray-500 hover:text-gray-700': activeTab !== 'all'
          }"
        >
          <span>全部</span>
          <span 
            class="inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-medium"
            [ngClass]="{
              'bg-blue-100 text-blue-700': activeTab === 'all',
              'bg-gray-100 text-gray-600': activeTab !== 'all'
            }"
          >
            {{ alerts.length }}
          </span>
        </button>
        
        <button 
          (click)="switchTab('critical')"
          class="flex items-center space-x-2 px-6 py-4 text-sm font-medium transition-colors"
          [ngClass]="{
            'text-red-600 border-b-2 border-red-600': activeTab === 'critical',
            'text-gray-500 hover:text-gray-700': activeTab !== 'critical'
          }"
        >
          <span>关键</span>
          <span 
            class="inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-medium"
            [ngClass]="{
              'bg-red-100 text-red-700': activeTab === 'critical',
              'bg-gray-100 text-gray-600': activeTab !== 'critical'
            }"
          >
            {{ criticalCount }}
          </span>
        </button>
        
        <button 
          (click)="switchTab('attention')"
          class="flex items-center space-x-2 px-6 py-4 text-sm font-medium transition-colors"
          [ngClass]="{
            'text-amber-600 border-b-2 border-amber-600': activeTab === 'attention',
            'text-gray-500 hover:text-gray-700': activeTab !== 'attention'
          }"
        >
          <span>需要注意</span>
          <span 
            class="inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-medium"
            [ngClass]="{
              'bg-amber-100 text-amber-700': activeTab === 'attention',
              'bg-gray-100 text-gray-600': activeTab !== 'attention'
            }"
          >
            {{ attentionCount }}
          </span>
        </button>
      </div>
      
      <div class="p-4">
        <div *ngIf="filteredAlerts.length > 0">
          <app-alert-card 
            *ngFor="let alert of filteredAlerts"
            [alert]="alert"
            (alertClick)="onAlertClick($event)"
          ></app-alert-card>
        </div>
        
        <div *ngIf="filteredAlerts.length === 0" class="text-center py-12">
          <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <p class="text-sm text-gray-500">暂无警报</p>
        </div>
      </div>
    </div>
  </div>
</div>
