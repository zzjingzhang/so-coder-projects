<div class="control-panel" [formGroup]="form">
  <div class="panel-header">
    <h2 class="panel-title">行星生成器控制</h2>
    <p class="panel-subtitle">调整参数创建独特的行星</p>
  </div>

  <div class="control-section">
    <h3 class="section-title">基础参数</h3>
    
    <div class="control-item">
      <label class="control-label">
        <span class="label-text">种子值 (Seed)</span>
        <span class="value-display">{{ form.get('seed')?.value }}</span>
      </label>
      <nz-input-number 
        formControlName="seed"
        [nzMin]="0"
        [nzMax]="999999"
        [nzStep]="1"
        class="w-full"
      ></nz-input-number>
    </div>

    <div class="control-item">
      <label class="control-label">
        <span class="label-text">水位 (Water Level)</span>
        <span class="value-display">{{ (form.get('waterLevel')?.value || 0) | percent }}</span>
      </label>
      <input 
        type="range"
        formControlName="waterLevel"
        min="0"
        max="1"
        step="0.01"
        class="slider"
      >
      <div class="slider-labels">
        <span class="slider-label">0%</span>
        <span class="slider-label">100%</span>
      </div>
    </div>

    <div class="control-item">
      <label class="control-label">
        <span class="label-text">噪声等级 (Noise Level)</span>
        <span class="value-display">{{ form.get('noiseLevel')?.value }}</span>
      </label>
      <input 
        type="range"
        formControlName="noiseLevel"
        min="1"
        max="10"
        step="1"
        class="slider"
      >
      <div class="slider-labels">
        <span class="slider-label">平滑</span>
        <span class="slider-label">崎岖</span>
      </div>
    </div>
  </div>

  <div class="control-section">
    <h3 class="section-title">高级参数</h3>
    
    <div class="control-item">
      <label class="control-label">
        <span class="label-text">八度 (Octaves)</span>
        <span class="value-display">{{ form.get('octaves')?.value }}</span>
      </label>
      <input 
        type="range"
        formControlName="octaves"
        min="1"
        max="12"
        step="1"
        class="slider"
      >
    </div>

    <div class="control-item">
      <label class="control-label">
        <span class="label-text">持续度 (Persistence)</span>
        <span class="value-display">{{ (form.get('persistence')?.value || 0).toFixed(2) }}</span>
      </label>
      <input 
        type="range"
        formControlName="persistence"
        min="0"
        max="1"
        step="0.05"
        class="slider"
      >
    </div>

    <div class="control-item">
      <label class="control-label">
        <span class="label-text">隙度 (Lacunarity)</span>
        <span class="value-display">{{ (form.get('lacunarity')?.value || 0).toFixed(1) }}</span>
      </label>
      <input 
        type="range"
        formControlName="lacunarity"
        min="1"
        max="4"
        step="0.1"
        class="slider"
      >
    </div>

    <div class="control-item">
      <label class="control-label">
        <span class="label-text">缩放 (Scale)</span>
        <span class="value-display">{{ (form.get('scale')?.value || 0).toFixed(1) }}</span>
      </label>
      <input 
        type="range"
        formControlName="scale"
        min="0.5"
        max="10"
        step="0.1"
        class="slider"
      >
    </div>
  </div>

  <div class="action-buttons">
    <button 
      nz-button 
      nzType="primary" 
      nzSize="large"
      (click)="onRegenerate()"
      class="primary-btn"
    >
      <span class="btn-icon">🔄</span>
      随机生成
    </button>
    
    <button 
      nz-button 
      nzSize="large"
      (click)="resetToDefaults()"
      class="secondary-btn"
    >
      <span class="btn-icon">↩️</span>
      重置默认值
    </button>
  </div>

  <div class="info-section">
    <div class="info-card">
      <div class="info-icon">💡</div>
      <div class="info-content">
        <h4>提示</h4>
        <p>调整水位可以改变行星上陆地和海洋的比例。水位越高，海洋面积越大。</p>
      </div>
    </div>
    
    <div class="info-card">
      <div class="info-icon">🎲</div>
      <div class="info-content">
        <h4>种子值</h4>
        <p>相同的种子值会生成完全相同的行星。分享种子值给朋友，让他们看到你发现的独特星球！</p>
      </div>
    </div>
  </div>
</div>
