<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#paperGradient)" stroke="#1a5276" stroke-width="3" />
  
  <!-- 纸张形状 - 张开的手 -->
  <g filter="url(#paperShadow)">
    <!-- 手掌 -->
    <ellipse cx="50" cy="65" rx="22" ry="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    
    <!-- 手指 -->
    <rect x="32" y="30" width="8" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" />
    <rect x="42" y="28" width="8" height="32" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" />
    <rect x="52" y="28" width="8" height="32" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" />
    <rect x="62" y="32" width="7" height="28" rx="3.5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" />
    
    <!-- 拇指 -->
    <ellipse cx="28" cy="55" rx="5" ry="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(-20 28 55)" />
    
    <!-- 高光效果 -->
    <ellipse cx="45" cy="40" rx="5" ry="8" fill="white" opacity="0.3" />
  </g>
  
  <!-- 文字标签 -->
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ecf0f1" text-anchor="middle">布</text>
</svg>