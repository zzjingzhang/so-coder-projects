<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="scissorsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </linearGradient>
    <filter id="scissorsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#scissorsGradient)" stroke="#922b21" stroke-width="3" />
  
  <!-- 剪刀形状 -->
  <g filter="url(#scissorsShadow)" transform="rotate(-30 50 50)">
    <!-- 左侧刀片 -->
    <path d="M35 45 L45 20 L55 20 L48 45 Q50 47 52 45 L59 20 L69 20 L59 45 Q57 50 59 55 L69 80 L59 80 L52 55 Q50 53 48 55 L41 80 L31 80 L41 55 Q39 50 41 45 Z" 
          fill="url(#metalGradient)" 
          stroke="#7f8c8d" 
          stroke-width="1" />
    
    <!-- 左侧指圈 -->
    <circle cx="35" cy="65" r="10" fill="none" stroke="url(#metalGradient)" stroke-width="4" />
    
    <!-- 右侧指圈 -->
    <circle cx="65" cy="65" r="10" fill="none" stroke="url(#metalGradient)" stroke-width="4" />
    
    <!-- 中心铆钉 -->
    <circle cx="50" cy="50" r="3" fill="#7f8c8d" stroke="#5d6d7e" stroke-width="1" />
    <circle cx="50" cy="50" r="1.5" fill="#95a5a6" />
  </g>
  
  <!-- 高光效果 -->
  <ellipse cx="40" cy="35" rx="5" ry="3" fill="white" opacity="0.2" />
  
  <!-- 文字标签 -->
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ecf0f1" text-anchor="middle">剪刀</text>
</svg>