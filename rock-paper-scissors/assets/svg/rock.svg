<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="rockGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1" />
    </radialGradient>
    <filter id="rockShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#rockGradient)" stroke="#5d6d7e" stroke-width="3" />
  
  <!-- 拳头形状 - 握紧的手 -->
  <g filter="url(#rockShadow)">
    <!-- 手腕部分 -->
    <ellipse cx="50" cy="70" rx="25" ry="12" fill="#88999a" />
    
    <!-- 手掌和手指部分 -->
    <path d="M30 55 Q28 45 35 40 Q40 38 45 40 L45 35 Q48 32 52 32 Q56 32 58 35 L58 38 Q62 36 68 38 Q75 42 73 55 Q70 68 50 70 Q30 68 30 55Z" 
          fill="#95a5a6" 
          stroke="#7f8c8d" 
          stroke-width="1.5" />
    
    <!-- 手指关节线 -->
    <path d="M40 48 Q45 45 50 48 Q55 45 60 48" stroke="#7f8c8d" stroke-width="1.5" fill="none" />
    <path d="M35 58 Q42 55 50 58 Q58 55 65 58" stroke="#7f8c8d" stroke-width="1" fill="none" />
    
    <!-- 拇指 -->
    <path d="M32 52 Q28 48 30 42 Q32 38 38 40" stroke="#7f8c8d" stroke-width="1.5" fill="none" />
    
    <!-- 高光效果 -->
    <ellipse cx="45" cy="45" rx="8" ry="5" fill="white" opacity="0.3" />
  </g>
  
  <!-- 文字标签 -->
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ecf0f1" text-anchor="middle">石头</text>
</svg>