<div class="min-h-screen bg-[#141414]">
  <header class="sticky top-0 z-10 bg-[#1f1f1f] border-b border-[#333333] shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🚗</span>
        <h1 class="text-2xl font-bold text-white">我的购车愿望清单</h1>
      </div>
      <button
        nz-button
        nzType="primary"
        nzSize="large"
        (click)="openAddModal()"
        class="flex items-center gap-2 px-6 !bg-blue-600 hover:!bg-blue-700"
      >
        <span nz-icon nzType="plus" nzTheme="outline"></span>
        <span>添加汽车</span>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    @if (cars().length === 0) {
      <div class="flex flex-col items-center justify-center py-32 text-center">
        <span class="text-8xl mb-6">🏎️</span>
        <h2 class="text-2xl font-semibold text-white mb-3">暂无汽车</h2>
        <p class="text-[#a0a0a0] mb-8">点击上方按钮添加你想购买的汽车</p>
        <button
          nz-button
          nzType="primary"
          nzSize="large"
          (click)="openAddModal()"
          class="!bg-blue-600 hover:!bg-blue-700"
        >
          添加第一辆汽车
        </button>
      </div>
    } @else {
      <div class="mb-6">
        <p class="text-[#a0a0a0]">共 <span class="text-white font-semibold">{{ cars().length }}</span> 辆车</p>
      </div>
      <div
        nz-row
        [nzGutter]="[24, 24]"
      >
        @for (car of cars(); track car.id) {
          <div
            nz-col
            [nzXs]="24"
            [nzSm]="12"
            [nzMd]="8"
            [nzLg]="6"
          >
            <nz-card
              class="h-full bg-[#1f1f1f] border-[#333333] rounded-xl overflow-hidden hover:shadow-xl hover:shadow-blue-900/20 transition-all duration-300 hover:-translate-y-1"
              [nzBordered]="false"
            >
              <div class="relative h-48 bg-[#2a2a2a] overflow-hidden -mx-6 -mt-6">
                <img
                  [src]="car.imageUrl"
                  alt="{{ car.brand }} {{ car.model }}"
                  class="w-full h-full object-cover"
                  (error)="$event.target.src = getDefaultImage(car.brand)"
                />
              </div>
              <div class="mt-4">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-lg font-bold text-white truncate">{{ car.brand }} {{ car.model }}</span>
                  <button
                    nz-button
                    nzType="text"
                    nzDanger
                    nzSize="small"
                    (click)="deleteCar(car)"
                    class="flex items-center justify-center"
                  >
                    <span nz-icon nzType="delete" nzTheme="outline"></span>
                  </button>
                </div>
                <div class="space-y-1">
                  <div class="flex items-center gap-2">
                    <span class="text-[#a0a0a0] text-sm">年份</span>
                    <span class="text-white text-sm">{{ car.year }}</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-[#a0a0a0] text-sm">价格</span>
                    <span class="text-green-400 font-bold text-lg">¥{{ formatPrice(car.price) }}</span>
                  </div>
                </div>
              </div>
            </nz-card>
          </div>
        }
      </div>
    }
  </main>
</div>
