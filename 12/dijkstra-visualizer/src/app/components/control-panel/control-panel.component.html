<div class="control-panel bg-white rounded-lg shadow-lg p-6">
  <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">控制面板</h2>

  <div class="progress-section mb-6">
    <div class="flex justify-between items-center mb-2">
      <span class="text-sm font-medium text-gray-600">执行进度</span>
      <span class="text-sm font-bold text-blue-600">{{ currentStep }} / {{ totalSteps }} ({{ progress }}%)</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-3">
      <div
        class="bg-gradient-to-r from-blue-500 to-blue-600 h-3 rounded-full transition-all duration-500"
        [style.width.%]="progress"
      ></div>
    </div>
  </div>

  <div class="button-section mb-6">
    <nz-space nzSize="middle" class="w-full justify-center flex-wrap">
      <button
        nz-button
        nzType="primary"
        nzSize="large"
        (click)="onStart()"
        [disabled]="isRunning || currentStep >= totalSteps"
        class="flex items-center justify-center min-w-24"
      >
        <i nz-icon nzType="play" nzTheme="outline" class="mr-2"></i>
        开始
      </button>
      <button
        nz-button
        nzType="default"
        nzSize="large"
        (click)="onStep()"
        [disabled]="isRunning || currentStep >= totalSteps"
        class="flex items-center justify-center min-w-24"
      >
        <i nz-icon nzType="step-forward" nzTheme="outline" class="mr-2"></i>
        单步
      </button>
      <button
        nz-button
        nzType="default"
        nzSize="large"
        (click)="onPause()"
        [disabled]="!isRunning"
        class="flex items-center justify-center min-w-24"
      >
        <i nz-icon nzType="pause" nzTheme="outline" class="mr-2"></i>
        暂停
      </button>
      <button
        nz-button
        nzType="default"
        nzSize="large"
        (click)="onReset()"
        class="flex items-center justify-center min-w-24"
        nzDanger
      >
        <i nz-icon nzType="reload" nzTheme="outline" class="mr-2"></i>
        重置
      </button>
    </nz-space>
  </div>

  <div class="speed-section">
    <label class="block text-sm font-medium text-gray-700 mb-2">动画速度</label>
    <nz-slider
      [nzMin]="500"
      [nzMax]="2000"
      [nzStep]="100"
      [nzMarks]="speedMarks"
      [(ngModel)]="animationSpeed"
      (ngModelChange)="onSpeedChange($event)"
      class="mb-4"
    ></nz-slider>
  </div>
</div>
