<div class="app-container min-h-screen flex flex-col">
  <header class="header bg-dark-card border-b border-dark-border sticky top-0 z-50">
    <mat-toolbar class="max-w-7xl mx-auto px-4 h-auto py-3 flex flex-wrap gap-4 bg-transparent">
      <div class="logo flex items-center gap-3">
        <span class="text-3xl">🏆</span>
        <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">
          GameTournament
        </h1>
      </div>

      <nav class="nav-links flex-1 flex justify-center gap-1">
        <button 
          mat-button 
          routerLink="/leaderboard" 
          routerLinkActive="active"
          class="nav-button px-4 py-2 rounded-lg text-text-secondary hover:text-text-primary hover:bg-primary/10 transition-all duration-200"
        >
          <mat-icon class="mr-2">leaderboard</mat-icon>
          排行榜
        </button>
        <button 
          mat-button 
          routerLink="/matches" 
          routerLinkActive="active"
          class="nav-button px-4 py-2 rounded-lg text-text-secondary hover:text-text-primary hover:bg-primary/10 transition-all duration-200"
        >
          <mat-icon class="mr-2">sports_esports</mat-icon>
          比赛进度
        </button>
        <button 
          mat-button 
          routerLink="/teams" 
          routerLinkActive="active"
          class="nav-button px-4 py-2 rounded-lg text-text-secondary hover:text-text-primary hover:bg-primary/10 transition-all duration-200"
        >
          <mat-icon class="mr-2">groups</mat-icon>
          参赛战队
        </button>
      </nav>

      <div class="header-actions flex items-center gap-2">
        <button mat-icon-button color="primary" class="w-10 h-10">
          <mat-icon>search</mat-icon>
        </button>
        <button mat-icon-button color="accent" class="w-10 h-10">
          <mat-icon>notifications</mat-icon>
        </button>
        <button mat-raised-button color="primary" class="hidden sm:flex">
          <mat-icon class="mr-2">login</mat-icon>
          登录
        </button>
      </div>
    </mat-toolbar>
  </header>

  <main class="main-content flex-1">
    <div class="hero-banner bg-gradient-to-r from-primary/20 via-accent/10 to-secondary/20 py-8 px-4 mb-6">
      <div class="max-w-7xl mx-auto">
        <div class="hero-content flex flex-col md:flex-row items-center justify-between gap-6">
          <div class="hero-text">
            <h2 class="text-3xl md:text-4xl font-bold text-text-primary mb-3">
              2024 全球电竞锦标赛
            </h2>
            <p class="text-text-secondary text-lg">
              见证顶尖战队的巅峰对决，实时追踪比赛进度与排名变化
            </p>
            <div class="hero-stats flex gap-6 mt-4">
              <div class="stat-item">
                <span class="text-2xl font-bold text-primary">16</span>
                <span class="text-text-secondary ml-1">参赛战队</span>
              </div>
              <div class="stat-item">
                <span class="text-2xl font-bold text-secondary">32</span>
                <span class="text-text-secondary ml-1">比赛场次</span>
              </div>
              <div class="stat-item">
                <span class="text-2xl font-bold text-accent">$500K</span>
                <span class="text-text-secondary ml-1">总奖金</span>
              </div>
            </div>
          </div>
          <div class="hero-badge flex flex-col items-center">
            <div class="live-badge flex items-center gap-2 px-4 py-2 bg-red-600/20 border border-red-500/50 rounded-full">
              <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
              <span class="text-red-500 font-semibold">LIVE NOW</span>
            </div>
            <p class="text-text-secondary mt-2 text-sm">正在进行: 半决赛</p>
          </div>
        </div>
      </div>
    </div>

    <div class="page-content max-w-7xl mx-auto px-4 pb-8">
      <router-outlet />
    </div>
  </main>

  <footer class="footer bg-dark-card border-t border-dark-border py-8">
    <div class="max-w-7xl mx-auto px-4">
      <div class="footer-content flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="footer-logo flex items-center gap-2">
          <span class="text-2xl">🏆</span>
          <span class="font-bold text-text-primary">GameTournament</span>
        </div>
        <div class="footer-links flex gap-6 text-text-secondary text-sm">
          <a href="#" class="hover:text-primary transition-colors">关于我们</a>
          <a href="#" class="hover:text-primary transition-colors">比赛规则</a>
          <a href="#" class="hover:text-primary transition-colors">常见问题</a>
          <a href="#" class="hover:text-primary transition-colors">联系我们</a>
        </div>
        <div class="footer-copyright text-text-secondary text-sm">
          © {{ currentYear() }} GameTournament. All rights reserved.
        </div>
      </div>
    </div>
  </footer>
</div>
