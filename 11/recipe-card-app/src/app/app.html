<!-- 全局导航栏 -->
<mat-toolbar color="primary" class="bg-gradient-to-r from-orange-500 to-red-500 shadow-lg">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <div class="flex items-center gap-3 cursor-pointer" (click)="goHome()">
      <mat-icon class="text-2xl">restaurant_menu</mat-icon>
      <span class="text-xl font-bold">食谱探索</span>
    </div>
    <div class="flex items-center gap-2">
      <button mat-icon-button color="accent" aria-label="关于">
        <mat-icon>info</mat-icon>
      </button>
    </div>
  </div>
</mat-toolbar>

<!-- 主内容区域 -->
<main class="min-h-screen">
  <router-outlet />
</main>

<!-- 页脚 -->
<footer class="bg-gray-800 text-white py-8 mt-auto">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div>
        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <mat-icon class="text-orange-400">restaurant_menu</mat-icon>
          食谱探索
        </h3>
        <p class="text-gray-400 text-sm">
          发现世界各地的美食，从简单的家常菜到精致的餐厅级料理。
        </p>
      </div>
      <div>
        <h3 class="text-lg font-semibold mb-4">快速链接</h3>
        <ul class="space-y-2 text-gray-400 text-sm">
          <li class="cursor-pointer hover:text-orange-400 transition-colors" (click)="goHome()">浏览食谱</li>
          <li class="cursor-pointer hover:text-orange-400 transition-colors">热门分类</li>
          <li class="cursor-pointer hover:text-orange-400 transition-colors">每周推荐</li>
        </ul>
      </div>
      <div>
        <h3 class="text-lg font-semibold mb-4">联系我们</h3>
        <p class="text-gray-400 text-sm">
          有任何问题或建议？欢迎反馈给我们！
        </p>
        <div class="flex gap-3 mt-4">
          <button mat-icon-button class="bg-gray-700 hover:bg-orange-500 transition-colors">
            <mat-icon class="text-sm">mail</mat-icon>
          </button>
          <button mat-icon-button class="bg-gray-700 hover:bg-orange-500 transition-colors">
            <mat-icon class="text-sm">chat</mat-icon>
          </button>
        </div>
      </div>
    </div>
    <mat-divider class="my-6 bg-gray-700"></mat-divider>
    <div class="text-center text-gray-400 text-sm">
      © 2026 食谱探索. 用心烹饪每一道菜.
    </div>
  </div>
</footer>
