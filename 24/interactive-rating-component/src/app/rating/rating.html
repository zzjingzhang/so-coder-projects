<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <p-card class="bg-medium-blue border-none rounded-3xl shadow-2xl">
      <ng-template pTemplate="header">
        <div class="p-6 pb-0">
          <div class="w-12 h-12 bg-light-blue rounded-full flex items-center justify-center mb-6">
            <i class="pi pi-star text-orange-accent text-2xl"></i>
          </div>
          <h1 class="text-2xl font-bold text-white mb-4">How did we do?</h1>
        </div>
      </ng-template>

      <div class="px-6 pb-4">
        <p class="text-gray-400 text-sm leading-relaxed mb-8">
          Please let us know how we did with your support request. All feedback is appreciated
          to help us improve our offering!
        </p>

        <div class="flex justify-between mb-8">
          @for (rating of ratings; track rating) {
            <button
              type="button"
              (click)="selectRating(rating)"
              class="w-12 h-12 rounded-full flex items-center justify-center text-gray-400 font-medium transition-all duration-300"
              [class.bg-light-blue]="!isSelected(rating)"
              [class.hover:bg-orange-accent]="!isSelected(rating)"
              [class.hover:text-white]="!isSelected(rating)"
              [class.bg-orange-accent]="isSelected(rating)"
              [class.text-white]="isSelected(rating)"
            >
              {{ rating }}
            </button>
          }
        </div>

        <button
          type="button"
          pButton
          (click)="submitRating()"
          [disabled]="selectedRating === 0"
          class="w-full py-3 rounded-full text-white font-semibold tracking-widest uppercase text-sm transition-all duration-300 bg-orange-accent hover:bg-white hover:text-orange-accent disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-orange-accent disabled:hover:text-white"
        >
          Submit
        </button>
      </div>
    </p-card>
  </div>
</div>
