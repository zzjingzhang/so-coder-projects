<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <script>
      // Redirect to main page after 3 seconds
      setTimeout(function() {
        window.location.href = '/';
      }, 3000);
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Animated background */
      .bg-animated {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .bg-animated::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        animation: rotate 30s linear infinite;
      }

      .bg-animated::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        animation: rotate 25s linear infinite reverse;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.3;
        animation: float 20s infinite ease-in-out;
      }

      .particle-1 {
        width: 400px;
        height: 400px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.3));
        top: -100px;
        left: -100px;
      }

      .particle-2 {
        width: 300px;
        height: 300px;
        background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.3));
        bottom: -50px;
        right: -50px;
        animation-delay: -5s;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      /* Content */
      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 900;
        background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }

      .error-title {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .error-message {
        color: rgba(255, 255, 255, 0.6);
        font-size: 1.125rem;
        margin-bottom: 2rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Glass Card */
      .glass-card {
        max-width: 400px;
        margin: 0 auto 2rem;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.5rem;
      }

      .icon-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .icon-circle {
        width: 4rem;
        height: 4rem;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-circle svg {
        width: 2rem;
        height: 2rem;
        color: #60a5fa;
      }

      .home-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 2rem;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        font-weight: 500;
        border-radius: 9999px;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
      }

      .home-btn:hover {
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        transform: translateY(-2px);
      }

      .redirect-info {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.875rem;
        margin-top: 1.5rem;
      }

      .dots {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .dot {
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .dot:nth-child(1) {
        background: linear-gradient(135deg, #60a5fa, #3b82f6);
        opacity: 0.3;
        animation-delay: 0s;
      }

      .dot:nth-child(2) {
        background: linear-gradient(135deg, #a78bfa, #8b5cf6);
        opacity: 0.45;
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        background: linear-gradient(135deg, #f472b6, #ec4899);
        opacity: 0.6;
        animation-delay: 0.4s;
      }

      .dot:nth-child(4) {
        background: linear-gradient(135deg, #a78bfa, #8b5cf6);
        opacity: 0.75;
        animation-delay: 0.6s;
      }

      .dot:nth-child(5) {
        background: linear-gradient(135deg, #60a5fa, #3b82f6);
        opacity: 0.9;
        animation-delay: 0.8s;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.2); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div class="bg-animated">
      <div class="particle particle-1"></div>
      <div class="particle particle-2"></div>
    </div>

    <div class="content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">The page you are looking for does not exist or has been moved.</p>

      <div class="glass-card">
        <div class="icon-container">
          <div class="icon-circle">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
        <a href="/" class="home-btn">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Back to Home
        </a>
      </div>

      <p class="redirect-info">Redirecting to home page in 3 seconds...</p>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </body>
</html>
