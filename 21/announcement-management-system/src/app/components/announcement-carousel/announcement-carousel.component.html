<div *ngIf="announcements.length > 0" class="announcement-carousel relative">
  <!-- PC端轮播 -->
  <div *ngIf="!isMobile" class="flex items-center gap-4">
    <div class="flex items-center gap-2 flex-shrink-0">
      <i class="pi pi-bullhorn text-blue-600 text-lg"></i>
      <span class="text-blue-700 font-medium text-sm">公告:</span>
    </div>

    <div class="flex-1 overflow-hidden relative">
      <div 
        class="announcement-carousel-item cursor-pointer"
        *ngIf="currentAnnouncement"
        (mouseenter)="onMouseEnter(currentAnnouncement)"
        (mouseleave)="onMouseLeave()"
        (click)="onViewDetail(currentAnnouncement)">
        <span class="announcement-carousel-title">{{ currentAnnouncement.title }}</span>
      </div>
    </div>

    <div class="flex items-center gap-2 flex-shrink-0">
      <button 
        type="button"
        class="p-1 text-blue-600 hover:text-blue-800 transition-colors"
        (click)="previous()">
        <i class="pi pi-chevron-left"></i>
      </button>
      <span class="text-sm text-gray-500">{{ currentIndex + 1 }}/{{ announcements.length }}</span>
      <button 
        type="button"
        class="p-1 text-blue-600 hover:text-blue-800 transition-colors"
        (click)="next()">
        <i class="pi pi-chevron-right"></i>
      </button>
    </div>
  </div>

  <!-- 移动端轮播 -->
  <div *ngIf="isMobile" class="w-full">
    <div 
      class="flex items-center gap-2 cursor-pointer"
      (click)="toggleMobileExpand()">
      <i class="pi pi-bullhorn text-blue-600"></i>
      <div class="flex-1 overflow-hidden">
        <div class="flex items-center justify-between">
          <span class="text-blue-700 font-medium text-sm truncate">
            {{ currentAnnouncement?.title }}
          </span>
          <i 
            class="pi text-blue-600 transition-transform"
            [class.pi-chevron-down]="!mobileExpanded"
            [class.pi-chevron-up]="mobileExpanded"></i>
        </div>
      </div>
    </div>

    <!-- 移动端展开详情 -->
    <div *ngIf="mobileExpanded && currentAnnouncement" class="mt-3 pt-3 border-t border-blue-200">
      <div class="text-sm text-gray-700 mb-3">
        {{ getSummary(currentAnnouncement, 200) }}
      </div>
      <div class="flex gap-2">
        <button 
          pButton 
          type="button" 
          label="查看详情" 
          icon="pi pi-external-link" 
          class="btn btn-primary text-sm"
          (click)="onViewDetail(currentAnnouncement); $event.stopPropagation()"></button>
        <button 
          pButton 
          type="button" 
          label="下一条" 
          icon="pi pi-chevron-right" 
          iconPos="right"
          class="btn btn-secondary text-sm"
          (click)="next(); $event.stopPropagation()"></button>
      </div>
    </div>
  </div>

  <!-- PC端悬停提示 -->
  <div 
    *ngIf="showTooltip && tooltipAnnouncement && !isMobile"
    class="absolute top-full left-0 mt-2 bg-white shadow-lg rounded-lg p-4 z-50 max-w-md border border-gray-200">
    <div class="font-medium text-gray-800 mb-2">{{ tooltipAnnouncement.title }}</div>
    <div class="text-sm text-gray-600 mb-3">{{ getSummary(tooltipAnnouncement, 150) }}</div>
    <div class="flex justify-between items-center text-xs text-gray-500">
      <span>发布时间: {{ formatTooltipDate(tooltipAnnouncement.publishTime) }}</span>
      <button 
        type="button"
        class="text-blue-600 hover:text-blue-800"
        (click)="onViewDetail(tooltipAnnouncement)">
        查看详情 <i class="pi pi-external-link ml-1"></i>
      </button>
    </div>
  </div>
</div>
