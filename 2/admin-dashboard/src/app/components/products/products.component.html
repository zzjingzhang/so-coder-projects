<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-white">商品管理</h2>
    <button 
      pButton 
      label="添加商品" 
      icon="pi pi-plus" 
      class="bg-blue-600 hover:bg-blue-700 text-white"
      (click)="openAddDialog()"
    ></button>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
    <p-table [value]="products" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>商品名称</th>
          <th>分类</th>
          <th>价格</th>
          <th>库存</th>
          <th>状态</th>
          <th>创建时间</th>
          <th>操作</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.price | currency: 'CNY' }}</td>
          <td>{{ product.stock }}</td>
          <td>
            <span 
              [class]="product.status === '在售' ? 'bg-green-100 text-green-700' : product.status === '缺货' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'"
              class="px-2 py-1 rounded-full text-xs font-medium"
            >
              {{ product.status }}
            </span>
          </td>
          <td>{{ product.createdAt }}</td>
          <td>
            <button 
              pButton 
              icon="pi pi-pencil" 
              class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg mr-2"
              (click)="openEditDialog(product)"
            ></button>
            <button 
              pButton 
              icon="pi pi-trash" 
              class="p-2 text-red-600 hover:bg-red-100 rounded-lg"
              (click)="openDeleteDialog(product)"
            ></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog 
    [(visible)]="displayDialog" 
    [header]="isEditMode ? '编辑商品' : '添加商品'" 
    [modal]="true"
    [style]="{ width: '400px' }"
  >
    <form [formGroup]="productForm" (ngSubmit)="saveProduct()">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">商品名称</label>
          <input pInputText formControlName="name" class="w-full" placeholder="请输入商品名称" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">分类</label>
          <input pInputText formControlName="category" class="w-full" placeholder="请输入分类" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">价格</label>
          <input pInputText type="number" formControlName="price" class="w-full" placeholder="请输入价格" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">库存</label>
          <input pInputText type="number" formControlName="stock" class="w-full" placeholder="请输入库存" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">状态</label>
          <p-dropdown 
            [options]="statusOptions" 
            formControlName="status" 
            placeholder="请选择状态"
            class="w-full"
          ></p-dropdown>
        </div>
      </div>
      
      <div class="flex justify-end gap-2 mt-6">
        <button 
          pButton 
          type="button" 
          label="取消" 
          class="bg-gray-200 hover:bg-gray-300 text-gray-700"
          (click)="displayDialog = false"
        ></button>
        <button 
          pButton 
          type="submit" 
          label="保存" 
          class="bg-blue-600 hover:bg-blue-700 text-white"
        ></button>
      </div>
    </form>
  </p-dialog>

  <p-dialog 
    [(visible)]="displayDeleteDialog" 
    header="确认删除" 
    [modal]="true"
    [style]="{ width: '400px' }"
  >
    <p>确定要删除商品 <strong>{{ selectedProduct?.name }}</strong> 吗？</p>
    
    <div class="flex justify-end gap-2 mt-6">
      <button 
        pButton 
        type="button" 
        label="取消" 
        class="bg-gray-200 hover:bg-gray-300 text-gray-700"
        (click)="displayDeleteDialog = false"
      ></button>
      <button 
        pButton 
        type="button" 
        label="删除" 
        class="bg-red-600 hover:bg-red-700 text-white"
        (click)="deleteProduct()"
      ></button>
    </div>
  </p-dialog>
</div>
