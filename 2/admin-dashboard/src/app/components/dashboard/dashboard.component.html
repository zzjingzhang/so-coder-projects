<div class="space-y-6">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <div 
      *ngFor="let card of infoCards" 
      class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700"
    >
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500 dark:text-gray-400">{{ card.title }}</p>
          <p class="text-2xl font-bold text-gray-900 dark:text-white mt-2">{{ card.value }}</p>
        </div>
        <div [class]="card.bgColor + ' p-3 rounded-lg'">
          <i [class]="card.icon + ' ' + card.color + ' text-xl'"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">销售趋势</h3>
      <div class="h-64">
        <canvas #lineChart></canvas>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">分类占比</h3>
      <div class="h-64">
        <canvas #doughnutChart></canvas>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">用户状态</h3>
      <div class="h-64">
        <canvas #pieChart></canvas>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">每日订单</h3>
      <div class="h-64">
        <canvas #barChart></canvas>
      </div>
    </div>
  </div>
</div>
