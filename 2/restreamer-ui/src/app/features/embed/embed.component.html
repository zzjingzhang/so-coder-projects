<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restreamer Embed Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body, app-root, #embed-player {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #000;
    }
  </style>
</head>
<body>
  <div 
    id="embed-player"
    class="relative w-full h-full bg-black"
    (mouseenter)="showControlsOverlay()"
    (mouseleave)="hideControlsOverlay()"
  >
    <video
      class="w-full h-full object-contain"
      [src]="streamUrl"
      [muted]="isMuted"
      (click)="togglePlay()"
    ></video>

    <div class="absolute top-2 right-2 px-3 py-1 bg-red-600 text-white text-xs font-bold rounded">
      LIVE
    </div>

    @if (!isPlaying) {
      <div class="absolute inset-0 flex items-center justify-center bg-black/30">
        <button
          class="w-16 h-16 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-colors"
          (click)="togglePlay()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white ml-1" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
      </div>
    }

    @if (showControls) {
      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button 
              class="text-white hover:text-blue-300 transition-colors"
              (click)="togglePlay()"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path *ngIf="isPlaying" d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                <path *ngIf="!isPlaying" d="M8 5v14l11-7z"/>
              </svg>
            </button>
            
            <button 
              class="text-white hover:text-blue-300 transition-colors"
              (click)="toggleMute()"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path *ngIf="!isMuted" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89 1.27 5 4.06 5 7.71s-2.11 6.44-5 7.71v2.06c4.01-1.29 7-4.91 7-9.77s-2.99-8.48-7-9.77z"/>
                <path *ngIf="isMuted" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM3 9v6h4l5 5V4L7 9H3zm13.5-3c0-1.38-1.12-2.5-2.5-2.5S14 4.62 14 6v12c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V6z"/>
              </svg>
            </button>
          </div>

          <div class="flex items-center gap-3">
            <button 
              class="text-white hover:text-blue-300 transition-colors"
              (click)="toggleFullscreen()"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</body>
</html>
