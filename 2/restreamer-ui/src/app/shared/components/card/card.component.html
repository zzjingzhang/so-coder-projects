<div 
  class="bg-white rounded-lg transition-all duration-200"
  [class.border]="hasBorder"
  [class.border-gray-200]="hasBorder"
  [class.shadow-sm]="hasShadow"
  [class.hover:shadow-md]="hoverable || clickable"
  [class.hover:border-gray-300]="hoverable || clickable"
  [class.cursor-pointer]="clickable"
  (click)="onCardClick()"
>
  @if (showHeader && (title || headerActions)) {
    <div 
      class="flex items-center justify-between border-b border-gray-100"
      [class]="getHeaderPaddingClass()"
    >
      <div>
        @if (title) {
          <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
        }
        @if (subtitle) {
          <p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>
        }
      </div>
      
      @if (headerActions) {
        <div class="flex items-center gap-2">
          <ng-content select="[header-actions]"></ng-content>
        </div>
      }
    </div>
  }
  
  <div [class]="getPaddingClass()">
    <ng-content></ng-content>
  </div>
  
  @if (showFooter) {
    <div 
      class="flex items-center justify-between bg-gray-50 border-t border-gray-100 rounded-b-lg"
      [class]="getPaddingClass()"
    >
      <ng-content select="[footer]"></ng-content>
    </div>
  }
</div>
