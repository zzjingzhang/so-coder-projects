<div class="flex flex-col items-center justify-center py-12 px-4 text-center">
  <div 
    class="flex items-center justify-center bg-gray-100 rounded-full mb-6"
    [class]="getIconSizeClass()"
  >
    <i [class]="getIconClass()" class="text-gray-400"></i>
  </div>
  
  @if (title) {
    <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ title }}</h3>
  }
  
  @if (description) {
    <p class="text-sm text-gray-500 max-w-md mb-6">{{ description }}</p>
  }
  
  @if (showAction && actionLabel) {
    <button
      pButton
      [label]="actionLabel"
      [icon]="actionIcon"
      class="p-button-primary"
      (click)="onAction()"
    ></button>
  }
</div>
