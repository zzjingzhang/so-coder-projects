<header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
  <div class="flex items-center justify-between h-16 px-4 sm:px-6 lg:px-8">
    <div class="flex items-center">
      <button 
        (click)="onToggleSidebar()"
        class="p-2 rounded-lg hover:bg-gray-100 lg:hidden"
        [pTooltip]="'Toggle Sidebar'"
        tooltipPosition="bottom"
      >
        <i class="pi pi-bars text-gray-600 text-xl"></i>
      </button>
      
      <div class="flex items-center ml-4 lg:ml-0">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center mr-3">
          <i class="pi pi-video text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-semibold text-gray-900">{{ title || ('app.title' | translate) }}</h1>
        </div>
      </div>
    </div>

    <div class="flex items-center space-x-3">
      <div class="relative">
        <button 
          (click)="toggleLanguageMenu()"
          class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-gray-100"
          [pTooltip]="'Change Language'"
          tooltipPosition="bottom"
        >
          <span class="text-lg">{{ currentLanguage.flag }}</span>
          <span class="hidden sm:inline text-sm text-gray-700">{{ currentLanguage.name }}</span>
          <i class="pi pi-chevron-down text-xs text-gray-500"></i>
        </button>

        @if (languageMenuVisible) {
          <div 
            class="absolute right-0 top-full mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50"
            (click)="$event.stopPropagation()"
          >
            @for (lang of languages; track lang.code) {
              <button 
                (click)="onLanguageChange(lang.code)"
                class="w-full flex items-center space-x-3 px-4 py-2 text-left hover:bg-gray-50"
                [class.bg-blue-50]="currentLang === lang.code"
              >
                <span class="text-lg">{{ lang.flag }}</span>
                <span class="text-sm text-gray-700">{{ lang.name }}</span>
                @if (currentLang === lang.code) {
                  <i class="pi pi-check text-blue-500 ml-auto"></i>
                }
              </button>
            }
          </div>
        }
      </div>

      @if (isLoggedIn) {
        <div class="relative">
          <button 
            (click)="toggleUserMenu()"
            class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-gray-100"
          >
            @if (avatarUrl) {
              <img [src]="avatarUrl" [alt]="username" class="w-8 h-8 rounded-full object-cover" />
            } @else {
              <p-avatar [label]="username.charAt(0).toUpperCase()" styleClass="bg-blue-500 text-white w-8 h-8"></p-avatar>
            }
            <span class="hidden md:inline text-sm font-medium text-gray-700">{{ username }}</span>
            <i class="pi pi-chevron-down text-xs text-gray-500"></i>
          </button>

          @if (userMenuVisible) {
            <div 
              class="absolute right-0 top-full mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-50"
              (click)="$event.stopPropagation()"
            >
              <div class="px-4 py-3 border-b border-gray-100">
                <div class="flex items-center space-x-3">
                  @if (avatarUrl) {
                    <img [src]="avatarUrl" [alt]="username" class="w-10 h-10 rounded-full object-cover" />
                  } @else {
                    <p-avatar [label]="username.charAt(0).toUpperCase()" styleClass="bg-blue-500 text-white w-10 h-10"></p-avatar>
                  }
                  <div>
                    <p class="text-sm font-medium text-gray-900">{{ username }}</p>
                  </div>
                </div>
              </div>
              
              <div class="py-1">
                <button 
                  class="w-full flex items-center space-x-3 px-4 py-2 text-left hover:bg-gray-50"
                >
                  <i class="pi pi-user text-gray-500"></i>
                  <span class="text-sm text-gray-700">{{ 'nav.profile' | translate }}</span>
                </button>
                
                <button 
                  class="w-full flex items-center space-x-3 px-4 py-2 text-left hover:bg-gray-50"
                >
                  <i class="pi pi-cog text-gray-500"></i>
                  <span class="text-sm text-gray-700">{{ 'nav.settings' | translate }}</span>
                </button>
              </div>
              
              <div class="border-t border-gray-100 pt-1">
                <button 
                  (click)="onLogout()"
                  class="w-full flex items-center space-x-3 px-4 py-2 text-left hover:bg-gray-50 text-red-600"
                >
                  <i class="pi pi-sign-out"></i>
                  <span class="text-sm">{{ 'auth.logout' | translate }}</span>
                </button>
              </div>
            </div>
          }
        </div>
      } @else {
        <button 
          pButton 
          [label]="'auth.login' | translate"
          icon="pi pi-sign-in"
          class="p-button-primary"
        ></button>
      }
    </div>
  </div>
</header>
