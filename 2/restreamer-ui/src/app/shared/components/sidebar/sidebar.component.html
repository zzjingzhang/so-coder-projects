@if (isOpen) {
  <div 
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="onClose()"
  ></div>
}

<aside 
  class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out"
  [class.-translate-x-full]="!isOpen"
  [class.translate-x-0]="isOpen"
>
  <div class="flex flex-col h-full">
    <div class="flex items-center justify-between h-16 px-4 border-b border-gray-200 lg:hidden">
      <div class="flex items-center">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center mr-2">
          <i class="pi pi-video text-white text-sm"></i>
        </div>
        <span class="font-semibold text-gray-900">{{ 'app.title' | translate }}</span>
      </div>
      <button 
        (click)="onClose()"
        class="p-2 rounded-lg hover:bg-gray-100"
      >
        <i class="pi pi-times text-gray-600"></i>
      </button>
    </div>

    <nav class="flex-1 px-3 py-4 overflow-y-auto">
      <div class="space-y-1">
        @for (item of navItems; track item.route) {
          <button
            (click)="onNavigate(item.route)"
            class="w-full flex items-center justify-between px-3 py-3 rounded-lg transition-colors"
            [class.bg-blue-50]="isActive(item.route)"
            [class.text-blue-700]="isActive(item.route)"
            [class.text-gray-700]="!isActive(item.route)"
            [class.hover:bg-gray-100]="!isActive(item.route)"
          >
            <div class="flex items-center space-x-3">
              <i [class]="item.icon" class="text-lg"></i>
              <span class="font-medium">{{ item.label | translate }}</span>
            </div>
            @if (item.badge) {
              <span 
                class="px-2 py-0.5 text-xs font-medium rounded-full"
                [class]="getBadgeClass(item.badgeColor)"
              >
                {{ item.badge }}
              </span>
            }
          </button>
        }
      </div>
    </nav>

    <div class="p-4 border-t border-gray-200">
      <div class="bg-gray-50 rounded-lg p-3">
        <div class="flex items-center space-x-3 mb-2">
          <i class="pi pi-info-circle text-blue-500"></i>
          <span class="text-sm font-medium text-gray-700">Need Help?</span>
        </div>
        <p class="text-xs text-gray-500 mb-3">
          Check our documentation for guides and tutorials.
        </p>
        <button 
          pButton 
          label="Documentation"
          icon="pi pi-external-link"
          class="p-button-text p-button-sm w-full"
        ></button>
      </div>
    </div>
  </div>
</aside>
